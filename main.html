<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BATTLESTATION // COMMAND DECK</title>
<style>
/* ============================================================
   BATTLESTATION  -  retro arcade / synthwave command console
   Single file. No external dependencies.
   To wire a tile to a real page, edit the "url" field in the
   STATIONS array near the bottom of this file.
   ============================================================ */

:root{
  --cyan:#0ff6ff;
  --pink:#ff2e97;
  --magenta:#ff00c8;
  --purple:#9d4edd;
  --violet:#6a2bd9;
  --gold:#ffd83d;
  --green:#39ff8a;
  --amber:#ffb627;
  --ink:#07021a;
  --panel:rgba(20,8,46,0.55);
  --line:rgba(255,46,151,0.35);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:#07021a;
  color:#e9d6ff;
  font-family:"Courier New",ui-monospace,Menlo,Consolas,monospace;
  overflow-x:hidden;
  -webkit-font-smoothing:none;
  text-rendering:optimizeSpeed;
  position:relative;
}

/* ----- atmosphere layers ----- */
.sky{
  position:fixed; inset:0; z-index:-5;
  background:
    radial-gradient(120% 80% at 50% 78%, rgba(255,46,151,0.18) 0%, rgba(157,78,221,0.10) 35%, transparent 60%),
    linear-gradient(180deg, #07021a 0%, #160438 38%, #3a0a52 66%, #6a0f6e 84%, #ff3d7f 100%);
}
.stars{position:fixed; inset:0; z-index:-4; overflow:hidden}
.stars i{
  position:absolute; width:2px; height:2px; background:#fff; border-radius:0;
  opacity:.85; animation:tw 3.2s steps(2) infinite;
}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}

/* sun with scanline gaps */
.sun{
  position:fixed; left:50%; top:46%; width:340px; height:340px;
  transform:translate(-50%,-50%); z-index:-3; border-radius:50%;
  background:linear-gradient(180deg,#fff27a 0%,#ffd83d 22%,#ff8a3d 52%,#ff2e97 100%);
  -webkit-mask:repeating-linear-gradient(180deg,#000 0 9px,transparent 9px 15px);
          mask:repeating-linear-gradient(180deg,#000 0 9px,transparent 9px 15px);
  filter:drop-shadow(0 0 60px rgba(255,80,160,.55));
  animation:sunpulse 5s ease-in-out infinite;
}
@keyframes sunpulse{0%,100%{filter:drop-shadow(0 0 50px rgba(255,80,160,.45))}50%{filter:drop-shadow(0 0 90px rgba(255,120,200,.7))}}

/* perspective grid floor */
.floor{
  position:fixed; left:50%; bottom:-10vh; width:300vw; height:75vh; z-index:-3;
  transform:translateX(-50%) perspective(320px) rotateX(74deg);
  transform-origin:50% 100%;
  background:
    repeating-linear-gradient(90deg, transparent 0 78px, rgba(0,246,255,.55) 78px 80px),
    repeating-linear-gradient(0deg,  transparent 0 78px, rgba(255,46,151,.55) 78px 80px);
  animation:floor 1.6s linear infinite;
  -webkit-mask:linear-gradient(180deg,transparent 0%,#000 40%);
          mask:linear-gradient(180deg,transparent 0%,#000 40%);
}
@keyframes floor{from{background-position:0 0,0 0}to{background-position:0 0,0 80px}}

/* CRT scanlines + vignette over everything */
.crt{
  position:fixed; inset:0; z-index:50; pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}
.vig{
  position:fixed; inset:0; z-index:49; pointer-events:none;
  box-shadow:inset 0 0 220px 40px rgba(2,0,12,.85);
}

/* ----- shell ----- */
.wrap{position:relative; z-index:2; max-width:1180px; margin:0 auto; padding:26px 18px 60px}

/* header HUD */
.hud{
  border:2px solid var(--line);
  background:linear-gradient(180deg, rgba(18,4,44,.72), rgba(8,2,24,.72));
  box-shadow:0 0 24px rgba(255,46,151,.25), inset 0 0 30px rgba(0,246,255,.06);
  padding:16px 18px; position:relative; margin-bottom:26px;
}
.hud::before,.hud::after{content:"";position:absolute;width:16px;height:16px;border:2px solid var(--cyan)}
.hud::before{left:-2px;top:-2px;border-right:0;border-bottom:0}
.hud::after{right:-2px;bottom:-2px;border-left:0;border-top:0}

.title{
  font-weight:700; letter-spacing:.14em; line-height:.92;
  font-size:clamp(30px,7vw,64px);
  color:#fff;
  text-shadow:
    0 0 2px #fff,
    3px 0 0 var(--pink),
    -3px 0 0 var(--cyan),
    0 0 22px rgba(255,46,151,.7);
  margin:0 0 4px; transform:skewX(-4deg);
}
.title b{color:var(--gold);-webkit-text-stroke:0;text-shadow:3px 0 0 var(--pink),-3px 0 0 var(--cyan),0 0 22px rgba(255,216,61,.6)}
.subtitle{
  font-size:12px; letter-spacing:.34em; color:var(--cyan);
  text-shadow:0 0 8px rgba(0,246,255,.6); margin-top:2px;
}

.statbar{
  display:flex; flex-wrap:wrap; gap:8px 22px; margin-top:14px;
  border-top:1px dashed rgba(0,246,255,.3); padding-top:12px;
  font-size:11px; letter-spacing:.16em; color:#cdb6ff;
}
.statbar span b{color:var(--green);text-shadow:0 0 8px rgba(57,255,138,.6)}
.statbar .blink{animation:blk 1s steps(2) infinite}
@keyframes blk{50%{opacity:.15}}

/* ----- grid of units ----- */
.grid{
  display:grid; gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(178px,1fr));
}

.unit{
  position:relative; display:flex; flex-direction:column; align-items:center;
  text-align:center; text-decoration:none; color:inherit;
  padding:20px 12px 16px; min-height:188px;
  background:linear-gradient(180deg,#160835 0%,#0a0420 100%);
  border:1px solid rgba(0,246,255,.28);
  box-shadow:inset 0 0 24px rgba(157,78,221,.12), 0 0 0 rgba(0,0,0,0);
  transition:transform .14s steps(3), box-shadow .2s, border-color .2s;
  cursor:pointer; overflow:hidden;
}
.unit:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
/* corner brackets */
.unit .c{position:absolute;width:12px;height:12px;border:2px solid var(--pink);opacity:.7;transition:opacity .2s}
.unit .c.tl{left:6px;top:6px;border-right:0;border-bottom:0}
.unit .c.tr{right:6px;top:6px;border-left:0;border-bottom:0}
.unit .c.bl{left:6px;bottom:6px;border-right:0;border-top:0}
.unit .c.br{right:6px;bottom:6px;border-left:0;border-top:0}

.unit:hover,.unit:focus-visible{
  transform:translateY(-4px) scale(1.03);
  border-color:var(--cyan);
  box-shadow:inset 0 0 28px rgba(0,246,255,.18), 0 0 26px rgba(0,246,255,.45);
}
.unit:hover .c{opacity:1;border-color:var(--cyan)}
.unit:active{transform:translateY(-1px) scale(.99)}

/* status light row */
.led-row{position:absolute;top:9px;right:11px;display:flex;align-items:center;gap:6px;font-size:8px;letter-spacing:.18em;color:#b59cff}
.led{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;animation:led 1.4s steps(2) infinite}
.led.g{color:var(--green);background:var(--green)}
.led.a{color:var(--amber);background:var(--amber)}
.led.c{color:var(--cyan);background:var(--cyan)}
@keyframes led{50%{opacity:.25}}

.glyph{width:70px;height:70px;margin:8px 0 12px;filter:drop-shadow(0 0 6px rgba(0,246,255,.45))}
.glyph svg{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}

.uname{font-size:15px;font-weight:700;letter-spacing:.1em;color:#fff;text-shadow:0 0 10px rgba(255,46,151,.6)}
.utag{margin-top:5px;font-size:9px;letter-spacing:.22em;color:var(--cyan);text-shadow:0 0 8px rgba(0,246,255,.5)}
.unum{position:absolute;left:10px;bottom:8px;font-size:9px;letter-spacing:.1em;color:rgba(255,216,61,.7)}

/* sweep shine across a unit on hover */
.unit::after{
  content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-20deg);transition:left .5s ease;pointer-events:none;
}
.unit:hover::after{left:130%}

/* footer */
.foot{margin-top:26px;text-align:center;font-size:10px;letter-spacing:.28em;color:rgba(0,246,255,.6)}
.foot .blink{animation:blk 1.2s steps(2) infinite}

/* toast for unwired tiles */
.toast{
  position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(120%);
  background:rgba(8,2,24,.92);border:2px solid var(--gold);color:var(--gold);
  padding:10px 18px;font-size:11px;letter-spacing:.2em;z-index:60;
  box-shadow:0 0 22px rgba(255,216,61,.4);transition:transform .25s ease;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* boot overlay */
.boot{
  position:fixed;inset:0;z-index:80;background:#04010f;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-size:13px;letter-spacing:.18em;color:var(--green);
  text-shadow:0 0 10px rgba(57,255,138,.6);
}
.boot pre{margin:0;line-height:1.7;white-space:pre-wrap;max-width:90vw}
.boot .bar{margin-top:18px;width:min(360px,80vw);height:14px;border:2px solid var(--green);padding:2px}
.boot .bar i{display:block;height:100%;width:0;background:var(--green);box-shadow:0 0 12px var(--green)}
.boot.gone{opacity:0;visibility:hidden;transition:opacity .5s, visibility .5s}

@media (prefers-reduced-motion: reduce){
  .floor,.sun,.led,.stars i,.statbar .blink,.foot .blink,
  .glyph svg *{animation:none !important}
}
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="sun"></div>
<div class="floor"></div>
<div class="crt"></div>
<div class="vig"></div>

<div class="wrap">
  <header class="hud">
    <h1 class="title">BATTLE<b>STATION</b></h1>
    <div class="subtitle">// LIFE COMMAND DECK &nbsp;v3.2 &nbsp;</div>
    <div class="statbar">
      <span>CMDR: <b>CHRIS</b></span>
      <span>SECTOR: <b>DALTON-GA</b></span>
      <span>DATE: <b id="date">--------</b></span>
      <span>STARDATE: <b id="clock">--:--:--</b></span>
      <span>UNITS: <b>10 / 10</b></span>
      <span class="blink">STATUS: <b>ALL SYSTEMS NOMINAL</b></span>
    </div>
  </header>

  <main class="grid" id="grid" aria-label="Command units"></main>

  <div class="foot"><span class="blink">&#9608;</span> SELECT A UNIT TO DEPLOY &nbsp;//&nbsp; INSERT COIN TO CONTINUE <span class="blink">&#9608;</span></div>
</div>

<div class="toast" id="toast">TARGET URL NOT SET // EDIT THE STATIONS LIST</div>

<!-- boot sequence -->
<div class="boot" id="boot">
  <pre id="bootlog"></pre>
  <div class="bar"><i id="bootbar"></i></div>
</div>

/* icon animation styles (kept in JS-injected style so glyphs stay self-contained) */

@keyframes hyu{0%,100%{filter:drop-shadow(0 0 0 rgba(127,223,255,0));transform:rotate(-16deg) scale(1)}50%{filter:drop-shadow(0 0 3px rgba(127,223,255,.9));transform:rotate(-16deg) scale(1.05)}}
.clk-sec{transform-box:view-box;transform-origin:8px 8px;animation:spin 6s steps(60) infinite}
.clk-min{transform-box:view-box;transform-origin:8px 8px;animation:spin 60s steps(60) infinite}
@media (prefers-reduced-motion: reduce){[class^="fin-"],[class^="gro-"],[class^="bch-"],[class^="mac-"],[class^="spi-"],[class^="ooda-"],[class^="hb"],[class^="hs-"],[class^="hyu"],[class^="clk-"]{animation:none !important}}
`;

/* ============================================================
   STATIONS  -  EDIT "url" TO POINT EACH TILE AT A REAL PAGE.
   Leave url as "#" and the tile flashes a "not set" message.
   ============================================================ */
const BASE = "https://cdsmith388.github.io/battlestation/";
const STATIONS = [
  { id:"finances",     label:"FINANCES",   tag:"ECONOMY CORE",  icon:"finances",     led:"g", url:BASE+"finances.html" },
  { id:"groceries",    label:"GROCERIES",  tag:"SUPPLY LINE",   icon:"groceries",    led:"g", url:BASE+"groceries.html" },
  { id:"beach",        label:"BEACH TRIP", tag:"R&R OPERATION", icon:"beach",        led:"c", url:BASE+"beach.html" },
  { id:"macbeth",      label:"MACBETH",    tag:"STAGE WARFARE", icon:"macbeth",      led:"a", url:BASE+"macbeth.html" },
  { id:"spirituality", label:"SPIRIT",     tag:"INNER CORE",    icon:"spirituality", led:"g", url:BASE+"spirituality.html" },
  { id:"ooda",         label:"OODA LOOP",  tag:"TACTICAL SCAN", icon:"ooda",         led:"c", url:BASE+"ooda.html" },
  { id:"habits",       label:"HABITS",     tag:"DAILY DRILL",   icon:"habits",       led:"g", url:BASE+"habits.html" },
  { id:"reno",         label:"FAWN RENO",  tag:"BASE BUILD",    icon:"house",        led:"a", url:BASE+"reno.html" },
  { id:"palisade",     label:"PALISADE",   tag:"MOTOR POOL",    icon:"car",          led:"g", url:BASE+"palisade.html" },
  { id:"eleventh",     label:"11TH HOUR",  tag:"THEATER CMD",   icon:"theatre",      led:"c", url:BASE+"eleventh.html" }
];

/* ---------- build ---------- */
const css = document.createElement("style"); css.textContent = ICON_CSS; document.head.appendChild(css);

// starfield
const stars = document.getElementById("stars");
for(let i=0;i<70;i++){
  const s=document.createElement("i");
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*60+"%";
  s.style.animationDelay=(Math.random()*3).toFixed(2)+"s";
  stars.appendChild(s);
}

// grid
const grid=document.getElementById("grid");
STATIONS.forEach((st,i)=>{
  const a=document.createElement("a");
  a.className="unit";
  a.href=st.url;
  if(st.url && st.url!=="#") a.target="_blank";
  a.rel="noopener";
  a.setAttribute("aria-label", st.label+" unit");
  a.innerHTML=`
    <span class="c tl"></span><span class="c tr"></span><span class="c bl"></span><span class="c br"></span>
    <span class="led-row"><span>ONLINE</span><span class="led ${st.led}"></span></span>
    <span class="glyph">${ICON[st.icon]||""}</span>
    <span class="uname">${st.label}</span>
    <span class="utag">${st.tag}</span>
    <span class="unum">U-${String(i+1).padStart(2,"0")}</span>`;
  a.addEventListener("click",e=>{
    if(!st.url || st.url==="#"){ e.preventDefault(); flash(st.label); }
  });
  grid.appendChild(a);
});

// toast
const toast=document.getElementById("toast");
let tt;
function flash(name){
  toast.textContent="UNIT "+name+" :: TARGET URL NOT SET";
  toast.classList.add("show");
  clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove("show"),2200);
}

// HUD clock
function tick(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  const days=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const mon=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  document.getElementById("date").textContent=days[d.getDay()]+" "+mon[d.getMonth()]+" "+p(d.getDate())+" "+d.getFullYear();
  document.getElementById("clock").textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
}
tick(); setInterval(tick,1000);

/* ---------- boot sequence ---------- */
(function(){
  const boot=document.getElementById("boot");
  const log=document.getElementById("bootlog");
  const bar=document.getElementById("bootbar");
  const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  const lines=[
    "BOOTING BATTLESTATION OS ...",
    "LOADING SYNTHWAVE GRID .......... OK",
    "CALIBRATING NEON DRIVERS ........ OK",
    "MOUNTING 10 LIFE UNITS .......... OK",
    "ARMING COMMAND DECK ............. OK",
    "WELCOME, COMMANDER CHRIS"
  ];
  if(reduce){ boot.classList.add("gone"); return; }
  let i=0;
  (function next(){
    if(i<lines.length){
      log.textContent += (i?"\n":"") + lines[i];
      bar.style.width = Math.round((i+1)/lines.length*100)+"%";
      i++; setTimeout(next, 360);
    } else {
      setTimeout(()=>boot.classList.add("gone"), 650);
    }
  })();
})();
</script>
</body>
