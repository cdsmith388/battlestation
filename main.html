<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BATTLESTATION // THE NIGHT KEEP</title>
<style>
/* ============================================================
   BATTLESTATION  -  THE NIGHT KEEP
   Gothic 16-bit JRPG life console. Castlevania / Chrono Trigger
   / Trials of Mana flavour. Single file, no dependencies.
   To repoint a tile, edit its "slug" in the STATIONS list below.
   ============================================================ */

:root{
  --gold:#f4d066; --gold-hi:#fff0b8; --gold-sh:#a97e22;
  --red:#e0344a; --red-sh:#7a0d1e;
  --purple:#a56bff; --violet:#6a2bd9;
  --stone:#b9c2e0; --moon:#e7ecff;
  --parch:#e8d8a8;
  --ink:#0a0620;
  --win:linear-gradient(180deg,#241a52,#120b2e);
  --fontpix:"Courier New",ui-monospace,Menlo,Consolas,monospace;
  --fontgoth:"Trajan Pro","Times New Roman",Georgia,serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:#05030f; color:#e9def7;
  font-family:var(--fontpix); overflow-x:hidden; position:relative;
  -webkit-font-smoothing:none;
}

/* ---------- night sky + scenery ---------- */
.sky{position:fixed; inset:0; z-index:-6;
  background:
    radial-gradient(120% 90% at 50% 6%, rgba(120,90,220,.20), transparent 45%),
    linear-gradient(180deg,#05030f 0%,#0b0726 40%,#150a34 70%,#26123f 100%);
}
.moon{position:fixed; left:50%; top:8%; width:190px; height:190px; z-index:-5;
  transform:translateX(-50%); border-radius:50%;
  background:radial-gradient(circle at 40% 38%, #ffffff 0%, #dfe6ff 38%, #aeb6e6 70%, #8a92c8 100%);
  box-shadow:0 0 60px 18px rgba(190,200,255,.35), inset -14px -10px 0 rgba(120,130,190,.35);
  animation:moonglow 7s ease-in-out infinite;
}
.moon::after{content:""; position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 62% 60%, rgba(140,150,205,.5) 0 8%, transparent 9%),
             radial-gradient(circle at 34% 66%, rgba(140,150,205,.45) 0 6%, transparent 7%);}
@keyframes moonglow{0%,100%{box-shadow:0 0 50px 14px rgba(190,200,255,.28),inset -14px -10px 0 rgba(120,130,190,.35)}
  50%{box-shadow:0 0 80px 24px rgba(200,210,255,.45),inset -14px -10px 0 rgba(120,130,190,.35)}}

.stars{position:fixed; inset:0 0 40% 0; z-index:-5; overflow:hidden}
.stars i{position:absolute; width:2px; height:2px; background:#fff; animation:tw 3.4s steps(2) infinite}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.9}}

.castle{position:fixed; left:0; bottom:0; width:100%; height:44vh; min-height:300px; z-index:-4}
.win-flick{animation:flick 2.6s steps(2) infinite}
@keyframes flick{0%,100%{opacity:1}45%{opacity:.35}55%{opacity:.9}}

.mist{position:fixed; left:0; bottom:0; width:100%; height:26vh; z-index:-3; pointer-events:none;
  background:
    radial-gradient(60% 80% at 20% 100%, rgba(150,140,210,.10), transparent 70%),
    radial-gradient(60% 80% at 80% 100%, rgba(150,140,210,.10), transparent 70%),
    linear-gradient(0deg, rgba(120,110,180,.10), transparent);
  animation:mist 12s ease-in-out infinite alternate;}
@keyframes mist{from{background-position:0 0,0 0,0 0}to{background-position:40px 0,-40px 0,0 0}}

.bat{position:fixed; z-index:-3; width:26px; height:14px; opacity:.9}
.bat svg{width:100%;height:100%}
.bat .wing{transform-box:view-box; transform-origin:8px 4px; animation:flap .28s steps(2) infinite}
.b1{top:20%; animation:fly1 16s linear infinite}
.b2{top:32%; animation:fly2 22s linear infinite; animation-delay:-6s; transform:scale(.8)}
.b3{top:14%; animation:fly1 19s linear infinite; animation-delay:-11s; transform:scale(1.15)}
@keyframes flap{50%{transform:scaleY(.45)}}
@keyframes fly1{0%{left:-6%;transform:translateY(0)}25%{transform:translateY(-18px)}50%{transform:translateY(6px)}75%{transform:translateY(-12px)}100%{left:106%;transform:translateY(0)}}
@keyframes fly2{0%{left:106%;transform:translateY(0) scaleX(-1)}25%{transform:translateY(14px) scaleX(-1)}50%{transform:translateY(-8px) scaleX(-1)}100%{left:-6%;transform:translateY(0) scaleX(-1)}}

/* CRT retro overlay */
.crt{position:fixed; inset:0; z-index:60; pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); mix-blend-mode:multiply}
.vig{position:fixed; inset:0; z-index:59; pointer-events:none; box-shadow:inset 0 0 240px 50px rgba(2,0,10,.8)}

/* ---------- shell ---------- */
.wrap{position:relative; z-index:2; max-width:1160px; margin:0 auto; padding:24px 16px 60px}

/* header banner */
.banner{position:relative; text-align:center; margin:6px 0 26px; padding:14px 10px 18px}
.banner .torch{position:absolute; top:-4px; width:34px; height:64px}
.banner .torch.l{left:2%} .banner .torch.r{right:2%}
.torch svg{width:100%;height:100%; filter:drop-shadow(0 0 10px rgba(255,150,60,.55))}
.torch .flame{transform-box:view-box; transform-origin:10px 12px; animation:torch .22s steps(2) infinite}
@keyframes torch{0%{transform:scaleY(1) translateX(0)}50%{transform:scaleY(.86) translateX(.6px)}100%{transform:scaleY(1.06) translateX(-.5px)}}

.title{margin:0; font-family:var(--fontgoth); font-weight:700; letter-spacing:.12em;
  font-size:clamp(30px,6.4vw,60px); line-height:1;
  background:linear-gradient(180deg,#fff6d6 0%,#f4d066 45%,#b8892a 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 2px 0 rgba(122,13,30,.55), 0 0 22px rgba(244,208,102,.35); }
.crest{display:inline-block; margin:0 10px; color:var(--red); text-shadow:0 0 10px rgba(224,52,74,.7); transform:translateY(-4px)}
.subtitle{margin-top:8px; font-size:11px; letter-spacing:.42em; color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,102,.4)}

/* status ribbon (JRPG window) */
.ribbon{margin:16px auto 0; max-width:760px; display:flex; flex-wrap:wrap; justify-content:center;
  gap:6px 20px; font-size:11px; letter-spacing:.16em; color:#d8c9ff;
  padding:9px 14px; background:var(--win);
  border:2px solid var(--gold); box-shadow:inset 0 0 0 2px var(--ink), 0 3px 0 #06040f;}
.ribbon b{color:var(--gold-hi)} .ribbon .g{color:var(--red);text-shadow:0 0 8px rgba(224,52,74,.6)}

/* ---------- inventory grid ---------- */
.grid{display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(152px,1fr))}

.slot{position:relative; display:flex; flex-direction:column; align-items:center; text-align:center;
  text-decoration:none; color:inherit; padding:18px 10px 14px; min-height:170px;
  background:var(--win); border:2px solid var(--gold-sh);
  box-shadow:inset 0 0 0 2px var(--ink), inset 0 0 18px rgba(120,80,210,.16), 0 4px 0 #06040f;
  transition:transform .12s steps(2), box-shadow .18s, border-color .18s; cursor:pointer; overflow:hidden}
.slot:focus-visible{outline:3px solid var(--gold-hi); outline-offset:2px}

/* corner ornaments (gold diamonds) */
.slot .orn{position:absolute; width:6px; height:6px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 4px rgba(244,208,102,.7)}
.slot .orn.tl{left:6px;top:6px}.slot .orn.tr{right:6px;top:6px}.slot .orn.bl{left:6px;bottom:6px}.slot .orn.br{right:6px;bottom:6px}

/* status gem */
.slot .gem{position:absolute; top:8px; right:9px; width:8px; height:8px; transform:rotate(45deg);
  box-shadow:0 0 8px currentColor; animation:gem 1.8s steps(2) infinite}
@keyframes gem{50%{opacity:.4}}
.g-gold{color:var(--gold);background:var(--gold)} .g-red{color:var(--red);background:var(--red)}
.g-purple{color:var(--purple);background:var(--purple)} .g-green{color:#4ec97a;background:#4ec97a}
.g-blue{color:#7fb4ff;background:#7fb4ff}

/* JRPG selection cursor */
.slot .cursor{position:absolute; left:6px; top:50%; transform:translateY(-50%) translateX(-8px);
  width:0;height:0; border-top:6px solid transparent; border-bottom:6px solid transparent;
  border-left:9px solid var(--gold-hi); opacity:0; transition:opacity .12s; filter:drop-shadow(0 0 4px rgba(244,208,102,.8))}
.slot:hover, .slot:focus-visible{transform:translateY(-4px); border-color:var(--gold-hi);
  box-shadow:inset 0 0 0 2px var(--ink), inset 0 0 22px rgba(180,120,255,.28), 0 0 22px rgba(244,208,102,.4), 0 4px 0 #06040f}
.slot:hover .cursor,.slot:focus-visible .cursor{opacity:1; animation:cbob .5s ease-in-out infinite}
@keyframes cbob{0%,100%{transform:translateY(-50%) translateX(0)}50%{transform:translateY(-50%) translateX(3px)}}
.slot:active{transform:translateY(-1px)}

.glyph{width:64px;height:64px;margin:6px 0 10px; filter:drop-shadow(0 3px 3px rgba(0,0,0,.5))}
.glyph svg{width:100%;height:100%; image-rendering:pixelated; image-rendering:crisp-edges}

.sname{font-size:14px; font-weight:700; letter-spacing:.08em; color:var(--gold-hi);
  text-shadow:1px 1px 0 var(--ink),-1px 1px 0 var(--ink),1px -1px 0 var(--ink),-1px -1px 0 var(--ink),0 0 10px rgba(244,208,102,.4)}
.stag{margin-top:4px; font-size:8.5px; letter-spacing:.2em; color:#b79cff; text-transform:uppercase}

.foot{margin-top:26px; text-align:center; font-size:10px; letter-spacing:.3em; color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,102,.35)}
.foot .bk{animation:bk 1.1s steps(2) infinite}
@keyframes bk{50%{opacity:.15}}

/* boot / gate overlay */
.boot{position:fixed; inset:0; z-index:90; background:radial-gradient(circle at 50% 40%, #170a2e, #05030f 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:var(--gold); font-size:13px; letter-spacing:.16em; text-shadow:0 0 10px rgba(244,208,102,.5)}
.boot pre{margin:0; line-height:1.8; white-space:pre-wrap; max-width:90vw}
.boot .bar{margin-top:18px; width:min(360px,80vw); height:16px; border:2px solid var(--gold); padding:2px; box-shadow:inset 0 0 0 1px var(--ink)}
.boot .bar i{display:block; height:100%; width:0; background:linear-gradient(90deg,#7a0d1e,#e0344a); box-shadow:0 0 10px rgba(224,52,74,.7)}
.boot.gone{opacity:0; visibility:hidden; transition:opacity .55s, visibility .55s}

@media (max-width:600px){ .banner .torch{display:none} }
@media (prefers-reduced-motion:reduce){
  .moon,.stars i,.mist,.bat,.win-flick,.torch .flame,.slot .gem,.foot .bk,.glyph svg *{animation:none !important}
}
</style>
</head>

/* icon animation styles */
const ICON_CSS = `
.glyph svg [class]{transform-box:view-box}
.fin-s,.sp1,.sp2,.hspk,.gspk{animation:spark 1.5s steps(2) infinite}.sp2{animation-delay:.5s}.gspk{animation-delay:.4s}.hspk{animation-delay:.7s}
@keyframes spark{0%,100%{opacity:.15}50%{opacity:1}}
.bob{transform-origin:8px 4px;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
.needle{transform-origin:8px 8px;animation:needle 4s ease-in-out infinite}
@keyframes needle{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(18deg)}}
.drip{transform-origin:8px 13px;animation:drip 2.6s ease-in infinite}
@keyframes drip{0%,55%{transform:translateY(0);opacity:0}60%{opacity:1}100%{transform:translateY(2.4px);opacity:0}}
.orb{transform-origin:8px 7.4px;animation:orb 2.6s ease-in-out infinite}
@keyframes orb{0%,100%{filter:drop-shadow(0 0 1px #a56bff)}50%{filter:drop-shadow(0 0 5px #c98bff)}}
.ring{animation:ringp 2.4s ease-in-out infinite}@keyframes ringp{0%,100%{opacity:.5}50%{opacity:1}}
.pupil{transform-origin:8px 8px;animation:scan 3.2s ease-in-out infinite}@keyframes scan{0%,100%{transform:translateX(-1.4px)}50%{transform:translateX(1.4px)}}
.hb1,.hb2,.hb3{stroke-dasharray:6;stroke-dashoffset:6;animation:draw 3s ease-in-out infinite}.hb2{animation-delay:.35s}.hb3{animation-delay:.7s}
@keyframes draw{0%,12%{stroke-dashoffset:6}30%,80%{stroke-dashoffset:0}100%{stroke-dashoffset:6}}
.hammer{transform-origin:10.7px 6.5px;animation:tap 1.5s ease-in-out infinite}
@keyframes tap{0%,60%,100%{transform:rotate(0)}30%{transform:rotate(-30deg)}45%{transform:rotate(3deg)}}
.hyu{transform-origin:8px 8px;animation:shim 3s ease-in-out infinite}
@keyframes shim{0%,100%{filter:drop-shadow(0 0 0 rgba(207,216,255,0));transform:scale(1)}50%{filter:drop-shadow(0 0 3px rgba(207,216,255,.9));transform:scale(1.05)}}
.mL{transform-origin:5px 7px;animation:swL 3s ease-in-out infinite}.mR{transform-origin:11px 8px;animation:swR 3s ease-in-out infinite}
@keyframes swL{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(3deg)}}@keyframes swR{0%,100%{transform:rotate(5deg)}50%{transform:rotate(-3deg)}}
.tassel{transform-origin:8px 10.6px;animation:swL 2.6s ease-in-out infinite}
.c1{animation:bob 2s ease-in-out infinite}.c2{animation:bob 2s ease-in-out .5s infinite}.c3{animation:bob 2s ease-in-out .25s infinite}
.tag{transform-origin:9.6px 2.6px;animation:swL 3s ease-in-out infinite}
.coin{transform-origin:11.4px 10px;animation:flip 2.4s ease-in-out infinite}@keyframes flip{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.28)}}
.x{transform-origin:11.4px 8.8px;animation:xp 1.6s ease-in-out infinite}@keyframes xp{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.beat{transform-origin:8px 8px;animation:beat 1.4s ease-in-out infinite}@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.14)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
.leaf{transform-origin:8px 8px;animation:swL 3s ease-in-out infinite}
.d1{transform-origin:5.4px 10px;animation:jig 1.6s ease-in-out infinite}.d2{transform-origin:11px 6.6px;animation:jig2 1.6s ease-in-out infinite}
@keyframes jig{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-1px) rotate(-7deg)}}
@keyframes jig2{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-1.4px) rotate(8deg)}}
@media (prefers-reduced-motion:reduce){.glyph svg *{animation:none !important}}
`;

const stars=document.getElementById("stars");

  a.className="slot"; a.href=BASE+d.slug+".html"; a.target="_blank"; a.rel="noopener";

  a.innerHTML=`<span class="orn tl"></span><span class="orn tr"></span><span class="orn bl"></span><span class="orn br"></span>

    <span class="sname">${d.label}</span><span class="stag">${d.tag}</span>`;

});

/* ---- HUD clock, date, moon ---- */
const MPH=["New","Waxing","First Qtr","Waxing Gib","Full","Waning Gib","Last Qtr","Waning"];
function moonPhase(d){
  const lp=2551442.8, newRef=947182440; // seconds; ref new moon 2000-01-06
  let p=(((d.getTime()/1000)-newRef)%lp)/lp; if(p<0)p+=1;
  return MPH[Math.floor(p*8+0.5)%8];
}
function tick(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  const days=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const mon=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  document.getElementById("date").textContent=days[d.getDay()]+" "+mon[d.getMonth()]+" "+p(d.getDate())+" "+d.getFullYear();
  document.getElementById("clock").textContent=p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  document.getElementById("moon").textContent=moonPhase(d);
}
tick(); setInterval(tick,1000);

/* ---- gate opening sequence ---- */
(function(){
  const boot=document.getElementById("boot"), log=document.getElementById("bootlog"), bar=document.getElementById("bootbar");
  if(matchMedia("(prefers-reduced-motion: reduce)").matches){boot.classList.add("gone");return;}
  const lines=["UNSEALING THE GATE ...","LIGHTING THE TORCHES ......... OK","ROUSING THE BATS ............. OK","SUMMONING 17 DOMAINS ......... OK","WARDING THE KEEP ............. OK","WELCOME HOME, LORD CHRIS"];
  let i=0;(function n(){
    if(i<lines.length){log.textContent+=(i?"\n":"")+lines[i];bar.style.width=Math.round((i+1)/lines.length*100)+"%";i++;setTimeout(n,340);}
    else setTimeout(()=>boot.classList.add("gone"),700);
  })();
})();
