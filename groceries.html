<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>larder · household grocery os</title>
<style>
:root{
  --paper:#F7F4ED;
  --paper2:#EFEBE0;
  --card:#FCFAF5;
  --ink:#2E2B26;
  --ink2:#6E6759;
  --ink3:#9A927F;
  --line:#DFD8C8;
  --teal:#4F7268;
  --teal-soft:#E4EBE7;
  --amber:#A87A34;
  --amber-soft:#F3E9D6;
  --rust:#A65846;
  --rust-soft:#F2E2DC;
  --mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,'Liberation Mono',monospace;
  --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  font-family:var(--body);
  background:var(--paper);
  color:var(--ink);
  line-height:1.45;
  background-image:radial-gradient(rgba(46,43,38,.028) 1px, transparent 1px);
  background-size:5px 5px;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:92px}

/* header */
header{
  position:sticky;top:0;z-index:20;
  background:rgba(247,244,237,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:14px 20px 10px;
  display:flex;align-items:baseline;justify-content:space-between;
}
.wordmark{font-family:var(--mono);font-size:1.05rem;letter-spacing:.06em;font-weight:700}
.wordmark span{color:var(--teal)}
.date-tag{font-family:var(--mono);font-size:.68rem;color:var(--ink3);letter-spacing:.05em}

/* nav */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(252,250,245,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1;background:none;border:none;cursor:pointer;
  padding:11px 0 9px;color:var(--ink3);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;
  transition:color .15s;
}
nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--teal)}
nav button .nbadge{position:absolute;transform:translate(11px,-3px);background:var(--amber);color:#fff;font-size:.55rem;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:700}
nav button{position:relative}

/* page shell */
.page{display:none;padding:18px 18px 8px;animation:fade .18s ease}
.page.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.page{animation:none}}

h2.sect{font-family:var(--mono);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin:22px 2px 8px;display:flex;align-items:center;gap:8px}
h2.sect::after{content:'';flex:1;border-top:1px dashed var(--line)}
h2.sect:first-child{margin-top:4px}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 15px;margin-bottom:10px;box-shadow:0 1px 0 rgba(46,43,38,.03)}

/* receipt-style rows: the signature */
.rrow{display:flex;align-items:baseline;gap:8px;padding:5px 0;font-size:.92rem}
.rrow .rname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
.rrow .leader{flex:1;border-bottom:2px dotted var(--line);transform:translateY(-4px)}
.rrow .rval{font-family:var(--mono);font-size:.86rem;white-space:nowrap}
.rrow .rval.good{color:var(--teal)}
.rrow .rval.warn{color:var(--amber)}
.rrow .rval.bad{color:var(--rust)}

/* big numbers */
.bignum{font-family:var(--mono);font-size:2.1rem;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.bignum small{font-size:1rem;font-weight:400;color:var(--ink2)}
.biglabel{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2);margin-bottom:4px}
.two-up{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* pills + status */
.pill{display:inline-block;font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:99px;border:1px solid var(--line);color:var(--ink2);background:var(--paper2)}
.pill.today{background:var(--rust-soft);border-color:#DCC0B6;color:var(--rust)}
.pill.soon{background:var(--amber-soft);border-color:#E0CFA8;color:var(--amber)}
.pill.week{background:var(--paper2);color:var(--ink2)}
.pill.low{background:var(--amber-soft);border-color:#E0CFA8;color:var(--amber)}
.pill.ok{background:var(--teal-soft);border-color:#C6D6CF;color:var(--teal)}
.pill.unc{border-style:dashed}

.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px}
.dot.confirmed{background:var(--teal)}
.dot.estimated{background:var(--amber)}
.dot.uncertain{background:transparent;border:1.5px dashed var(--ink3)}
.dot.gone{background:var(--ink3)}

/* buttons */
.btn{
  font-family:var(--mono);font-size:.78rem;letter-spacing:.04em;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  padding:9px 14px;border-radius:8px;cursor:pointer;transition:background .12s;
}
.btn:active{background:var(--paper2)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#FCFAF5;font-weight:700}
.btn.primary:active{background:#425F57}
.btn.wide{display:block;width:100%;text-align:center;padding:13px}
.btn.tiny{font-size:.66rem;padding:5px 9px;border-radius:6px}
.btn.ghost{background:transparent}
.btn:focus-visible,nav button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* item cards */
.item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.item .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.item .name{font-weight:600;font-size:.95rem}
.item .meta{font-family:var(--mono);font-size:.66rem;color:var(--ink2);margin-top:3px;letter-spacing:.03em}
.item .why{font-size:.78rem;color:var(--ink2);margin-top:2px}
.qtybar{display:flex;gap:4px;margin-top:8px}
.qtybar b{height:5px;flex:1;border-radius:3px;background:var(--paper2)}
.qtybar b.f{background:var(--teal)}
.qtybar b.f.low{background:var(--amber)}

/* list rows in shop */
.lrow{display:flex;align-items:flex-start;gap:11px;padding:11px 2px;border-bottom:1px dashed var(--line)}
.lrow:last-child{border-bottom:none}
.chk{width:21px;height:21px;min-width:21px;border:1.5px solid var(--ink3);border-radius:6px;background:var(--card);cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;color:transparent;transition:all .12s}
.chk.on{background:var(--teal);border-color:var(--teal);color:#fff}
.chk svg{width:13px;height:13px;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.lrow .lname{font-size:.93rem;font-weight:600}
.lrow.done .lname{text-decoration:line-through;color:var(--ink3);font-weight:400}
.lrow .lwhy{font-size:.75rem;color:var(--ink2)}
.lrow .lprice{font-family:var(--mono);font-size:.8rem;margin-left:auto;white-space:nowrap;color:var(--ink2)}
.lrow .lbody{flex:1;min-width:0}

/* tabs inside shop */
.subtabs{display:flex;gap:6px;margin-bottom:12px}
.subtabs button{flex:1;font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:8px 0;border:1px solid var(--line);background:var(--card);border-radius:8px;color:var(--ink2);cursor:pointer}
.subtabs button.on{background:var(--ink);color:var(--card);border-color:var(--ink)}

/* store compare */
.store{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;background:var(--card);cursor:pointer;transition:border-color .12s}
.store.pick{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal)}
.store .shead{display:flex;justify-content:space-between;align-items:baseline}
.store .sname{font-weight:700;font-size:.95rem}
.store .stotal{font-family:var(--mono);font-weight:700;font-size:1.05rem}
.store .scov{font-family:var(--mono);font-size:.66rem;color:var(--ink2);margin-top:2px}
.bestflag{font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);background:var(--teal-soft);padding:2px 7px;border-radius:99px;margin-left:7px;vertical-align:2px}

/* inputs */
input[type=text],input[type=number],select{
  font-family:var(--body);font-size:.9rem;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  padding:9px 11px;width:100%;
}
.formrow{display:flex;gap:8px;margin-bottom:8px}
label.flab{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);display:block;margin:8px 0 4px}

/* chips (filters, meal types) */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-family:var(--mono);font-size:.66rem;letter-spacing:.05em;padding:6px 11px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer}
.chip.on{background:var(--ink);color:var(--card);border-color:var(--ink)}

/* plan */
.day{display:flex;gap:12px;padding:12px 2px;border-bottom:1px dashed var(--line);align-items:flex-start}
.day:last-child{border-bottom:none}
.day .dlabel{font-family:var(--mono);font-size:.68rem;color:var(--ink2);width:46px;line-height:1.3;padding-top:3px}
.day .dlabel b{display:block;font-size:.82rem;color:var(--ink)}
.day .dbody{flex:1}
.mealchips{display:flex;gap:5px;flex-wrap:wrap}
.mchip{font-family:var(--mono);font-size:.62rem;padding:5px 9px;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer}
.mchip.on{background:var(--teal);color:#fff;border-color:var(--teal)}

/* toast */
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--card);font-family:var(--mono);font-size:.74rem;padding:9px 16px;border-radius:8px;opacity:0;pointer-events:none;transition:all .2s;z-index:50;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modal */
#modal-wrap{position:fixed;inset:0;background:rgba(46,43,38,.35);display:none;align-items:flex-end;justify-content:center;z-index:60}
#modal-wrap.show{display:flex}
#modal{background:var(--paper);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 20px 28px;max-height:82vh;overflow-y:auto}
#modal h3{font-family:var(--mono);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

/* item icons */
.icn{display:inline-flex;align-items:center;justify-content:center;background:var(--paper2);border:1px solid var(--line);border-radius:9px;width:38px;height:38px;min-width:38px;font-size:1.25rem;line-height:1}
.icn.sm{width:26px;height:26px;min-width:26px;font-size:.95rem;border-radius:7px;vertical-align:-7px;margin-right:7px}
.icn.xs{width:22px;height:22px;min-width:22px;font-size:.8rem;border-radius:6px;vertical-align:-5px;margin-right:6px;background:transparent;border-color:transparent}

/* ---------- virtual kitchen ---------- */
.viewtoggle{display:flex;gap:6px;margin-bottom:12px}
.viewtoggle button{flex:1;font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;padding:8px 0;border:1px solid var(--line);background:var(--card);border-radius:8px;color:var(--ink2);cursor:pointer}
.viewtoggle button.on{background:var(--ink);color:var(--card);border-color:var(--ink)}

.kitchen{display:flex;flex-direction:column;gap:12px}
.appliance{border:1.5px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden;box-shadow:0 2px 0 rgba(46,43,38,.04)}
.appliance.fridgebox{border-radius:16px;border-width:2px}
.appliance.fridgebox .zone[data-loc="Freezer"]{border-bottom:2px solid var(--line);background:linear-gradient(180deg,#F0F3F4,#EAEFF1)}
.appliance.fridgebox .zone[data-loc="Fridge"]{background:linear-gradient(180deg,#FBFCFA,#F4F6F1)}
.zone{padding:0 0 8px;transition:background .15s,box-shadow .15s;min-height:78px;position:relative}
.zone.hover{box-shadow:inset 0 0 0 2px var(--teal);background:var(--teal-soft)!important}
.zhead{display:flex;align-items:baseline;gap:7px;padding:9px 13px 3px;font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.zhead .zcount{margin-left:auto;color:var(--ink3);letter-spacing:0}
.zbody{display:flex;flex-wrap:wrap;gap:2px;padding:2px 8px 4px;align-items:flex-end}
.zone[data-loc="Pantry"] .zbody{background-image:linear-gradient(to top,var(--line) 1px,transparent 1px);background-size:100% 86px;background-position:0 100%}
.zone[data-loc="Counter"]{background:linear-gradient(180deg,#F6F1E6,#F1EADB)}
.zone[data-loc="Garage"]{background:repeating-linear-gradient(45deg,var(--card),var(--card) 14px,#F3EFE6 14px,#F3EFE6 15px)}
.zempty{font-size:.72rem;color:var(--ink3);font-style:italic;padding:6px 8px 10px}

.tile{width:66px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 1px 6px;border-radius:10px;cursor:grab;user-select:none;-webkit-user-select:none;position:relative}
.tile:active{cursor:grabbing}
.tile .tico{font-size:1.5rem;line-height:1;background:var(--card);border:1px solid var(--line);width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 1px 0 rgba(46,43,38,.06)}
.tile .tbadge{position:absolute;top:-4px;right:-4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--card)}
.tile .tbadge.today{background:var(--rust)}
.tile .tbadge.soon{background:var(--amber)}
.tile .tbadge.week{background:#D8C89A}
.tile .tname{font-family:var(--mono);font-size:.54rem;color:var(--ink2);text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile .tpips{display:flex;gap:2px}
.tile .tpips i{width:5px;height:5px;border-radius:50%;background:var(--paper2);border:1px solid var(--line)}
.tile .tpips i.f{background:var(--teal);border-color:var(--teal)}
.tile .tpips i.f.low{background:var(--amber);border-color:var(--amber)}
.tile.lifted{opacity:.25}

#ghost{position:fixed;z-index:100;pointer-events:none;display:none;transform:translate(-50%,-60%) scale(1.18);filter:drop-shadow(0 6px 10px rgba(46,43,38,.25))}
#ghost .tico{font-size:1.5rem;background:var(--card);border:1px solid var(--line);width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center}

.empty{color:var(--ink3);font-size:.85rem;padding:14px 4px;text-align:center;font-style:italic}
.hint{font-size:.75rem;color:var(--ink3);margin-top:6px;line-height:1.4}
.why-link{font-family:var(--mono);font-size:.62rem;color:var(--teal);cursor:pointer;text-decoration:underline dotted;background:none;border:none;padding:0}
.spacer{height:8px}
.action-card{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.action-card .anum{font-family:var(--mono);font-size:.7rem;color:var(--teal);font-weight:700;padding-top:2px}
.action-card .atext{font-size:.87rem;flex:1}
.action-card .atext small{display:block;color:var(--ink2);font-size:.74rem;margin-top:1px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="wordmark">larder<span>.</span></div>
    <div class="date-tag" id="hdr-date"></div>
  </header>

  <main>
    <section class="page" id="page-today"></section>
    <section class="page" id="page-pantry"></section>
    <section class="page" id="page-shop"></section>
    <section class="page" id="page-plan"></section>
    <section class="page" id="page-budget"></section>
  </main>

  <nav id="nav"></nav>
</div>

<div id="toast"></div>
<div id="ghost"><div class="tico"></div></div>
<div id="modal-wrap"><div id="modal"></div></div>

<script>

/* ---------- derived logic ---------- */
function confidence(it){
  const d=daysSince(it.purchased);
  if(d<=7)return'confirmed';
  if(d<=21)return'estimated';
  if(d<=45)return'uncertain';
  return'gone';
}
function useSoon(it){
  const win=PERISH[it.cat];
  if(!win||it.loc==='Freezer'||it.qty===0)return null;
  const d=daysSince(it.purchased);
  const left=win-d;
  if(left<=0)return{level:'Use today',cls:'today',rank:0};
  if(left<=2)return{level:'Use in '+left+(left===1?' day':' days'),cls:'soon',rank:1};
  if(left<=5)return{level:'Use this week',cls:'week',rank:2};
  return null;
}
function useSoonItems(){
  return S.inventory.map(it=>({it,us:useSoon(it)})).filter(x=>x.us).sort((a,b)=>a.us.rank-b.us.rank);
}
function runningLow(){
  return S.inventory.filter(it=>it.qty===1&&confidence(it)!=='gone');
}
function dupsFor(name){
  return S.inventory.filter(it=>it.name===name&&it.qty>0&&confidence(it)!=='gone');
}
function activeList(){return S.list.filter(l=>!l.checked);}
function bestPrice(name){
  const b=BOOK[name];if(!b)return null;
  let best=null;
  for(const s of STORES){if(b.p[s]!=null&&(best===null||b.p[s]<best.price))best={store:s,price:b.p[s]};}
  return best;
}
function storeTotals(){
  const items=activeList();
  const out=STORES.map(store=>{
    let total=0,covered=0,missing=[];
    items.forEach(l=>{
      const b=BOOK[l.name];
      if(b&&b.p[store]!=null){total+=b.p[store]*l.qty;covered++;}
      else missing.push(l.name);
    });
    return{store,total,covered,missing,count:items.length};
  });
  return out;
}
function splitPlan(){
  const items=activeList();
  let total=0;const used=new Set();
  items.forEach(l=>{const bp=bestPrice(l.name);if(bp){total+=bp.price*l.qty;used.add(bp.store);}});
  return{total,stores:[...used]};
}
function plannedCart(){
  const t=storeTotals().filter(s=>s.covered>0).sort((a,b)=>(b.covered-a.covered)||(a.total-b.total));
  return t.length?t[0]:null;
}
function monthSpent(){
  const m=todayISO().slice(0,7);
  return S.purchases.filter(p=>p.date.slice(0,7)===m).reduce((a,p)=>a+p.total,0);
}
function budgetState(){
  const spent=monthSpent();
  const cart=plannedCart();
  const planned=cart?cart.total:0;
  const remaining=S.budget.monthly-spent;
  const after=remaining-planned;
  const now=new Date();
  const eom=new Date(now.getFullYear(),now.getMonth()+1,0);
  const daysLeft=Math.max(1,eom.getDate()-now.getDate()+1);
  const tripMax=Math.max(0,Math.round(remaining/Math.max(1,Math.ceil(daysLeft/7))));
  return{spent,planned,remaining,after,daysLeft,tripMax};
}
function nextShopDay(){
  /* simple heuristic: essentials depletion vs preferred weekday */
  const low=runningLow().length;
  const soon=useSoonItems().filter(x=>x.us.rank<2).length;
  const offset=low>=3?1:(low>=1?2:4);
  const d=new Date(Date.now()+offset*864e5);
  return d.toLocaleDateString('en-US',{weekday:'long'});
}

/* ---------- drag and drop engine (pointer events: touch + mouse) ---------- */
const drag={id:null,active:false,sx:0,sy:0,timer:null,el:null};
function bindDrag(){
  document.querySelectorAll('#page-pantry .tile').forEach(t=>{
    t.addEventListener('pointerdown',onTileDown);
  });
}
function onTileDown(e){
  const el=e.currentTarget;
  drag.id=el.dataset.id;drag.el=el;drag.sx=e.clientX;drag.sy=e.clientY;drag.active=false;
  clearTimeout(drag.timer);
  const delay=e.pointerType==='mouse'?0:220; /* long-press to lift on touch, instant on mouse */
  drag.timer=setTimeout(()=>{if(drag.id&&e.pointerType!=='mouse')liftTile();},delay===0?9999:delay);
  document.addEventListener('pointermove',onDragMove);
  document.addEventListener('pointerup',onDragUp);
  document.addEventListener('pointercancel',onDragUp);
}
function liftTile(){
  if(!drag.el)return;
  drag.active=true;
  drag.el.classList.add('lifted');
  const it=S.inventory.find(i=>i.id===drag.id);
  const g=$('#ghost');g.querySelector('.tico').textContent=it?ic(it.name):'🛒';
  g.style.display='block';
  moveGhost(drag.sx,drag.sy);
  if(navigator.vibrate)navigator.vibrate(10);
}
function moveGhost(x,y){const g=$('#ghost');g.style.left=x+'px';g.style.top=y+'px';}
function zoneAt(x,y){
  const el=document.elementFromPoint(x,y);
  return el?el.closest('.zone'):null;
}
function onDragMove(e){
  if(!drag.id)return;
  const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
  if(!drag.active){
    if(Math.abs(dx)>7||Math.abs(dy)>7){
      if(e.pointerType==='mouse'){liftTile();}
      else{clearTimeout(drag.timer);cleanupDrag();return;} /* touch moved early = scroll */
    }
    return;
  }
  e.preventDefault();
  moveGhost(e.clientX,e.clientY);
  document.querySelectorAll('.zone').forEach(z=>z.classList.remove('hover'));
  const z=zoneAt(e.clientX,e.clientY);
  if(z)z.classList.add('hover');
}
function onDragUp(e){
  clearTimeout(drag.timer);
  if(drag.active){
    const z=zoneAt(e.clientX,e.clientY);
    const it=S.inventory.find(i=>i.id===drag.id);
    if(z&&it&&z.dataset.loc!==it.loc){
      it.loc=z.dataset.loc;
      if(z.dataset.loc==='Freezer'&&!it.frozen){it.frozen=1;it.purchased=todayISO();} /* freezing pauses the clock */
      save();
      toast(ic(it.name)+' '+it.name+' → '+z.dataset.loc+' '+LOC_ICONS[z.dataset.loc]);
    }
    cleanupDrag();render();
  }else if(drag.id&&Math.abs(e.clientX-drag.sx)<7&&Math.abs(e.clientY-drag.sy)<7){
    const id=drag.id;cleanupDrag();itemSheet(id); /* tap */
  }else cleanupDrag();
}
function cleanupDrag(){
  drag.id=null;drag.active=false;drag.el&&drag.el.classList.remove('lifted');drag.el=null;
  $('#ghost').style.display='none';
  document.querySelectorAll('.zone').forEach(z=>z.classList.remove('hover'));
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragUp);
  document.removeEventListener('pointercancel',onDragUp);
}
/* block scroll only while an item is lifted */
document.addEventListener('touchmove',e=>{if(drag.active)e.preventDefault();},{passive:false});

  const b=budgetState();
  const cats={};
  S.purchases.filter(p=>p.date.slice(0,7)===todayISO().slice(0,7)).forEach(p=>{cats[p.store]=(cats[p.store]||0)+p.total;});
  const pct=Math.min(100,Math.round(monthSpent()/S.budget.monthly*100));
  $('#page-budget').innerHTML=`
    <div class="card">
      <div class="rrow"><span class="rname">Monthly budget</span><span class="leader"></span><span class="rval">${fmt(S.budget.monthly)}</span></div>
      <div class="rrow"><span class="rname">Spent</span><span class="leader"></span><span class="rval">${fmt(b.spent)}</span></div>
      <div class="rrow"><span class="rname">Planned cart</span><span class="leader"></span><span class="rval">${fmt(b.planned)}</span></div>
      <div class="rrow" style="border-top:1px dashed var(--line);padding-top:8px;margin-top:3px">
        <span class="rname"><b>Available after cart</b></span><span class="leader"></span>
        <span class="rval ${b.after<0?'bad':'good'}"><b>${fmt(b.after)}</b></span></div>
      <div class="qtybar" style="margin-top:12px"><b class="f" style="flex:${pct};${pct>90?'background:var(--rust)':''}"></b><b style="flex:${100-pct}"></b></div>
      <div class="hint">${pct}% of the month's budget used with ${b.daysLeft} days left</div>
    </div>

    <h2 class="sect">This trip</h2>
    <div class="card">
      <div class="rrow"><span class="rname">Recommended maximum</span><span class="leader"></span><span class="rval good">${fmt(b.tripMax)}</span></div>
      <div class="hint">Based on ${fmt(b.remaining)} remaining spread across roughly ${Math.max(1,Math.ceil(b.daysLeft/7))} more ${Math.ceil(b.daysLeft/7)===1?'trip':'trips'} this month. A guide, not a rule.</div>
      ${b.planned>b.tripMax?overBudgetHelp(b):''}
    </div>

    <h2 class="sect">Spend by store · ${monthName()}</h2>
    <div class="card">
      ${Object.keys(cats).length?Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([s,v])=>`
        <div class="rrow"><span class="rname">${STORE_ICONS[s]||'🧾'} ${s}</span><span class="leader"></span><span class="rval">${fmt(v)}</span></div>`).join(''):'<div class="empty">No purchases this month yet</div>'}
    </div>

    <h2 class="sect">Waste log</h2>
    <div class="card">
      ${S.wasteLog.length?S.wasteLog.slice(0,5).map(w=>`
        <div class="rrow"><span class="rname">${icn(w.item,'xs')}${w.item}</span><span class="leader"></span><span class="rval" style="color:var(--ink3);font-size:.7rem">${w.reason}</span></div>`).join(''):'<div class="empty">Nothing wasted lately</div>'}
      ${S.wasteLog.filter(w=>w.item==='Celery').length>=2?'<div class="hint" style="color:var(--amber)">Celery has been tossed twice after buying a full bunch. Consider a smaller amount, or only buy it attached to a planned meal.</div>':''}
    </div>

    <h2 class="sect">Settings</h2>
    <div class="card">
      <label class="flab">Monthly grocery budget</label>
      <input type="number" id="set-budget" value="${S.budget.monthly}" onchange="S.budget.monthly=+this.value||800;save();render()">
      <label class="flab">What an extra store stop costs you (gas + time)</label>
      <input type="number" step="0.5" id="set-pen" value="${S.prefs.tripPenalty}" onchange="S.prefs.tripPenalty=+this.value||0;save();render()">
      <div class="spacer"></div>
      <button class="btn wide" onclick="resetModal()">Reset app data…</button>
    </div>
    <div class="hint">No red alarms, no guilt. Numbers are here to help you decide, not to scold.</div>`;
}
function overBudgetHelp(b){
  const diff=b.planned-b.tripMax;
  const ideas=[];
  if(activeList().some(l=>l.name==='Chicken breast')&&S.inventory.some(i=>i.name==='Chicken breast'&&i.loc==='Freezer'))
    ideas.push('Use the frozen chicken already at home');
  if(activeList().some(l=>l.name==='Kitchen trash bags'))ideas.push('Delay trash bags to the next cycle: save '+fmt((bestPrice('Kitchen trash bags')||{price:0}).price));
  if(activeList().some(l=>l.name==='Oreos'))ideas.push('ALDI sandwich cookies instead of Oreos: save about $2');
  return`<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">
    <div style="font-size:.84rem">The planned cart runs <b>${fmt(diff)}</b> over the trip target. Possible adjustments:</div>
    ${ideas.length?ideas.map(i=>`<div class="lwhy" style="margin-top:5px">· ${i}</div>`).join(''):'<div class="lwhy" style="margin-top:5px">· Postpone one household item, or split the trip toward ALDI</div>'}
  </div>`;
}

/* ---------- master render ---------- */
function render(){
  $('#hdr-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toLowerCase();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  $('#page-'+cur).classList.add('on');
  renderNav();
  if(cur==='today')renderToday();
  if(cur==='pantry')renderPantry();
  if(cur==='shop')renderShop();
  if(cur==='plan')renderPlan();
  if(cur==='budget')renderBudget();
}
render();
</script>
</body>
</html>
