<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jim Hawkins: The Line Treasure Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --ocean:#0e1a2b; --ocean2:#13253c; --sea:#1d5b6e; --seahi:#2e7d95;
  --parch:#e8d5a0; --parch2:#d4b978; --parchdark:#b89a5e;
  --gold:#ffd23f; --gold2:#f2a71b; --coral:#d94f30; --coral2:#a83a22;
  --ink:#2a1f14; --white:#f5efe0; --green:#4caf6d; --green2:#2e7d4f;
  --purple:#6c5b9e; --hp:#e04b3a; --hpbg:#4a1810;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--ocean);
  font-family:'VT323', monospace;
  color:var(--white);
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  image-rendering:pixelated;
}
/* pixel water backdrop */
#seaBg{
  position:fixed; inset:0; z-index:0;
  background:
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(46,125,149,.10) 22px 24px),
    repeating-linear-gradient(90deg, transparent 0 46px, rgba(46,125,149,.06) 46px 48px),
    linear-gradient(180deg, #0a1420 0%, #0e1a2b 40%, #123049 100%);
}
.wave{position:fixed; width:36px; height:8px; background:var(--seahi); opacity:.35; z-index:0;
  box-shadow:12px 0 0 -2px var(--seahi), -12px 0 0 -2px var(--seahi);
  animation:bob 3.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

#game{position:relative; z-index:2; height:100%; max-width:760px; margin:0 auto; display:flex; flex-direction:column;}

/* ---------- HUD ---------- */
#hud{
  display:none; align-items:center; gap:10px; padding:8px 12px;
  background:var(--ocean2); border-bottom:4px solid #000;
  font-family:'Press Start 2P', monospace; font-size:11px;
}
#hud.show{display:flex;}
.hudItem{display:flex; align-items:center; gap:5px; color:var(--gold);}
.hudItem .val{color:var(--white);}
#streakBox{color:#ff8c42;}
#backBtn{margin-left:auto; cursor:pointer; background:var(--sea); border:3px solid #000; color:var(--white);
  font-family:'Press Start 2P',monospace; font-size:9px; padding:7px 9px; box-shadow:0 3px 0 #000;}
#backBtn:active{transform:translateY(2px); box-shadow:0 1px 0 #000;}
#masteryWrap{width:100%; padding:6px 12px 8px; background:var(--ocean2); border-bottom:4px solid #000; display:none;}
#masteryWrap.show{display:block;}
#masteryLbl{font-family:'Press Start 2P',monospace; font-size:8px; color:var(--parch2); margin-bottom:4px; letter-spacing:1px;}
.pbar{height:16px; background:#000; border:3px solid #000; position:relative; overflow:hidden;}
.pbar .fill{height:100%; background:repeating-linear-gradient(90deg, var(--gold) 0 8px, var(--gold2) 8px 16px); transition:width .5s steps(8);}
.pbar .txt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Press Start 2P',monospace; font-size:8px; color:#fff; text-shadow:1px 1px 0 #000;}

#stage{flex:1; overflow-y:auto; overflow-x:hidden; position:relative; padding-bottom:20px;}
#stage::-webkit-scrollbar{width:10px;}
#stage::-webkit-scrollbar-thumb{background:var(--sea); border:2px solid #000;}

/* ---------- Title screen ---------- */
#title{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100%; text-align:center; padding:24px; gap:18px;}
#title h1{font-family:'Press Start 2P',monospace; font-size:clamp(18px,5vw,34px); color:var(--gold);
  text-shadow:3px 3px 0 var(--coral2), 6px 6px 0 #000; line-height:1.5; animation:titleFloat 3s ease-in-out infinite;}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#title h2{font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.4vw,13px); color:var(--seahi); line-height:1.9;}
.bigBtn{
  font-family:'Press Start 2P',monospace; font-size:clamp(12px,3vw,16px);
  background:var(--coral); color:#fff; border:4px solid #000; padding:16px 28px;
  box-shadow:0 6px 0 var(--coral2), 0 6px 0 3px #000; cursor:pointer; letter-spacing:1px;
}
.bigBtn:active{transform:translateY(4px); box-shadow:0 2px 0 var(--coral2), 0 2px 0 3px #000;}
.bigBtn.green{background:var(--green); box-shadow:0 6px 0 var(--green2), 0 6px 0 3px #000;}
.bigBtn.green:active{box-shadow:0 2px 0 var(--green2), 0 2px 0 3px #000;}
.bigBtn.gold{background:var(--gold2); color:#3a2100; box-shadow:0 6px 0 #b3780e, 0 6px 0 3px #000;}
.bigBtn.gold:active{box-shadow:0 2px 0 #b3780e, 0 2px 0 3px #000;}
#soundToggle{position:fixed; bottom:12px; right:12px; top:auto; z-index:50; font-family:'Press Start 2P',monospace; font-size:10px;
  background:var(--ocean2); color:var(--gold); border:3px solid #000; padding:8px; cursor:pointer; box-shadow:0 3px 0 #000;}

/* ---------- World Map (SMW style) ---------- */
#mapScreen{padding:0 0 30px;}
#mapTitle{font-family:'Press Start 2P',monospace; text-align:center; font-size:clamp(11px,3vw,15px); color:var(--gold); margin:12px 0; text-shadow:2px 2px 0 #000;}
#worldMap{
  position:relative; height:1560px; margin:0 8px; overflow:hidden;
  border:5px solid #000; box-shadow:0 0 0 3px var(--sea);
  background:linear-gradient(180deg,
    #e8cf8a 0%, #dcc077 4%,            /* island beach top rim */
    #f0dc9a 6%, #cdb069 9%,
    #2f8f4a 10%, #1f6b38 26%,          /* island jungle */
    #f0dc9a 27%, #d8bd78 30%,          /* island south beach */
    #3a7ec2 31%, #1c4a8a 42%,          /* deep sea */
    #2f6cb0 46%, #1a4680 56%,          /* sea */
    #58c0e0 57%, #58c0e0 58%,
    #d8bd78 58.5%, #c8ab66 60%,        /* England shore */
    #58a050 61%, #3f8040 78%, #2f6030 100%); /* England green */
}
/* SNES terrain textures */
.zoneTex{position:absolute; left:0; right:0; z-index:1; pointer-events:none;}
.grassTex{background:
  repeating-linear-gradient(90deg, rgba(0,0,0,.07) 0 3px, transparent 3px 7px),
  repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 2px, transparent 2px 9px);}
.grassTex.jungle{background:
  radial-gradient(circle at 30% 30%, rgba(255,255,255,.08) 2px, transparent 3px),
  repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 4px, transparent 4px 9px);
  background-size:15px 12px, auto;}
.sandTex{background-image:radial-gradient(circle, rgba(90,60,20,.28) 1px, transparent 1.7px); background-size:9px 7px;}
.foamTex{background:repeating-linear-gradient(90deg, rgba(240,250,255,.95) 0 9px, transparent 9px 17px); height:6px;}
.waterTex{background:
  repeating-linear-gradient(0deg, rgba(255,255,255,.10) 0 2px, transparent 2px 14px),
  repeating-linear-gradient(90deg, rgba(8,26,66,.18) 0 26px, transparent 26px 52px);
  animation:waterScroll 7s linear infinite;}
@keyframes waterScroll{0%{background-position:0 0, 0 0;}100%{background-position:0 28px, 52px 0;}}
.seaSparkle{position:absolute; width:26px; height:6px; background:rgba(255,255,255,.35); pointer-events:none; animation:bob 3s ease-in-out infinite;}
.mapNode{
  position:absolute; width:46px; height:46px; margin:-23px 0 0 -23px; cursor:pointer; z-index:6;
  background:var(--gold); border:4px solid #000; border-radius:50%;
  box-shadow:0 4px 0 #000, inset -5px -5px 0 var(--gold2);
  font-family:'Press Start 2P',monospace; font-size:13px; color:#3a2100;
  display:flex; align-items:center; justify-content:center;
  animation:nodePulse 1.6s steps(2) infinite;
}
.mapNode.beat{background:var(--green); box-shadow:0 4px 0 #000, inset -5px -5px 0 var(--green2); color:#eafff0; animation:none;}
.mapNode:hover{transform:scale(1.15);}
@keyframes nodePulse{0%,100%{box-shadow:0 4px 0 #000, inset -5px -5px 0 var(--gold2);}50%{box-shadow:0 4px 0 #000, inset -5px -5px 0 var(--gold2), 0 0 0 6px rgba(255,210,63,.35);}}
.nodeSpr{position:absolute; z-index:5; pointer-events:none; transform:translate(-50%,-100%);}
.nodeSpr canvas{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.4)); animation:bob 2.6s ease-in-out infinite;}
.nodeLbl{
  position:absolute; z-index:7; transform:translate(-50%,0); pointer-events:none;
  font-family:'Press Start 2P',monospace; font-size:7px; line-height:1.6; color:#fff;
  background:rgba(0,0,0,.65); border:2px solid #000; padding:4px 6px; text-align:center; white-space:nowrap;
}
.nodeStars{position:absolute; z-index:7; transform:translate(-50%,0); pointer-events:none; font-size:15px; letter-spacing:1px; color:rgba(0,0,0,.35); text-shadow:1px 1px 0 rgba(255,255,255,.25);}
.nodeStars .lit{color:var(--gold); text-shadow:1px 1px 0 #000;}
.pathDot{position:absolute; width:8px; height:8px; background:#fff8e0; border:2px solid #000; z-index:4; margin:-4px 0 0 -4px; pointer-events:none;}
.decor{position:absolute; z-index:3; pointer-events:none;}
.decor canvas{filter:drop-shadow(2px 3px 0 rgba(0,0,0,.35));}
.decor.clickable{pointer-events:auto; cursor:pointer;}
.mtn{position:absolute; width:0; height:0; z-index:2; pointer-events:none;
  border-left:70px solid transparent; border-right:70px solid transparent; border-bottom:95px solid #6b6b7a;}
.mtn::after{content:''; position:absolute; left:-24px; top:34px; border-left:24px solid transparent; border-right:24px solid transparent; border-bottom:30px solid #e8e8f0;}
.bigX{position:absolute; z-index:3; font-family:'Press Start 2P',monospace; font-size:30px; color:var(--coral); text-shadow:3px 3px 0 #000; pointer-events:none; animation:nodePulse 2s steps(2) infinite;}
.innHouse{position:absolute; z-index:3; width:86px; pointer-events:none;}
.innRoof{width:0;height:0;border-left:43px solid transparent;border-right:43px solid transparent;border-bottom:34px solid #8f2f1c; margin:0 auto;}
.innBody{width:70px; height:44px; background:#a5754a; border:4px solid #000; margin:0 auto; position:relative;}
.innBody::before{content:''; position:absolute; left:8px; top:8px; width:14px; height:14px; background:#ffd23f; border:3px solid #000;}
.innBody::after{content:''; position:absolute; right:8px; top:8px; width:16px; height:26px; background:#4e2e18; border:3px solid #000;}
.innSign{font-family:'Press Start 2P',monospace; font-size:6px; color:#fff; background:#000; text-align:center; padding:3px 2px; width:86px;}
/* serpent easter egg */
.serpentSpot{position:absolute; z-index:8; width:100px; height:110px; overflow:hidden; pointer-events:none; transform:translate(-50%,-100%);}
.serpentSpot canvas{position:absolute; left:14px; animation:serpentRise 2.4s ease-in-out forwards;}
@keyframes serpentRise{0%{top:120px;}25%{top:8px;}60%{top:8px; transform:rotate(0deg);}70%{transform:rotate(-8deg);}100%{top:130px; transform:rotate(-4deg);}}
.splashPx{position:absolute; width:8px; height:8px; background:#bfe8ff; border:1px solid #2e7d95; z-index:9; pointer-events:none; animation:splashFly .7s ease-out forwards;}
@keyframes splashFly{0%{opacity:1; transform:translate(0,0);}100%{opacity:0; transform:translate(var(--sx), var(--sy));}}

/* ---------- Level intro / stage select ---------- */
.panel{
  margin:18px auto; max-width:560px; background:var(--ocean2);
  border:4px solid #000; box-shadow:0 0 0 3px var(--sea), 0 8px 0 rgba(0,0,0,.55);
  padding:18px 16px; text-align:center;
}
.panel h3{font-family:'Press Start 2P',monospace; font-size:clamp(11px,3vw,14px); color:var(--gold); line-height:1.8; margin-bottom:6px;}
.panel .sub{font-size:22px; color:var(--seahi); margin-bottom:12px;}
.stageBtn{
  display:flex; align-items:center; gap:12px; width:100%; margin:10px 0; padding:12px 14px;
  background:var(--sea); border:4px solid #000; box-shadow:0 4px 0 #000; cursor:pointer; text-align:left;
  color:var(--white);
}
.stageBtn:active{transform:translateY(3px); box-shadow:0 1px 0 #000;}
.stageBtn .ico{font-size:26px; width:34px; text-align:center;}
.stageBtn .stTitle{font-family:'Press Start 2P',monospace; font-size:11px; color:var(--gold);}
.stageBtn .stDesc{font-size:19px; color:#bcd8e2; line-height:1.1;}
.stageBtn.done{background:var(--green2);}
.stageBtn.done .stTitle{color:#d9ffd9;}
.stageBtn.lockedStage{opacity:.4; pointer-events:none;}

/* ---------- Play area ---------- */
#playWrap{padding:14px 12px 30px; max-width:620px; margin:0 auto;}
#stageHeader{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;}
#stageName{font-family:'Press Start 2P',monospace; font-size:11px; color:var(--gold); line-height:1.7;}
#lineCount{font-family:'Press Start 2P',monospace; font-size:9px; color:var(--seahi);}
.miniPbar{height:12px; margin-bottom:14px;}

.cueBox{
  background:var(--parch); color:var(--ink); border:4px solid var(--ink);
  box-shadow:0 5px 0 rgba(0,0,0,.5); padding:12px 14px; margin-bottom:14px; position:relative;
}
.cueBox .cueTag{font-family:'Press Start 2P',monospace; font-size:8px; color:var(--coral2); margin-bottom:6px; letter-spacing:1px;}
.cueBox .cueTxt{font-size:clamp(22px,4.5vw,27px); line-height:1.15;}
.lineBox{
  background:#10314a; border:4px solid var(--seahi); box-shadow:0 5px 0 rgba(0,0,0,.5);
  padding:14px; margin-bottom:14px;
}
.lineBox .lineTag{font-family:'Press Start 2P',monospace; font-size:8px; color:var(--gold); margin-bottom:8px; letter-spacing:1px;}
.lineBox .lineTxt{font-size:clamp(24px,5vw,30px); line-height:1.2; color:var(--white);}
.blankSlot{display:inline-block; min-width:70px; border-bottom:4px solid var(--gold); color:var(--gold); text-align:center; padding:0 4px; margin:0 2px;}
.blankSlot.filledOk{color:var(--green); border-color:var(--green);}
.chipRow{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:10px;}
.chip{
  font-family:'VT323',monospace; font-size:24px; background:var(--gold); color:#3a2100;
  border:4px solid #000; box-shadow:0 4px 0 #b3780e, 0 4px 0 3px #000; padding:8px 16px; cursor:pointer;
}
.chip:active{transform:translateY(3px); box-shadow:0 1px 0 #b3780e, 0 1px 0 3px #000;}
.chip.wrongFlash{background:var(--coral); color:#fff; animation:shakeX .3s;}
.chip.used{opacity:.25; pointer-events:none;}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.tileTray{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:12px;}
.buildLine{min-height:56px; background:#0b2436; border:4px dashed var(--seahi); padding:10px; font-size:26px; line-height:1.25; margin-top:4px;}
.buildLine .placed{color:var(--white);}
.ctrlRow{display:flex; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap;}

/* ---------- Battle ---------- */
#battleArena{position:relative; background:linear-gradient(180deg,#152c42 0%, #0d2033 100%);
  border:4px solid #000; box-shadow:0 6px 0 rgba(0,0,0,.5); padding:14px 10px 10px; margin-bottom:14px;}
#bossRow{display:flex; justify-content:space-between; align-items:flex-end; gap:10px; min-height:130px;}
.fighter{text-align:center; width:44%;}
.fighter canvas{filter:drop-shadow(3px 3px 0 rgba(0,0,0,.5));}
.fighter .fname{font-family:'Press Start 2P',monospace; font-size:8px; margin-top:4px; line-height:1.6;}
.hpbar{height:14px; background:var(--hpbg); border:3px solid #000; margin-top:5px; overflow:hidden;}
.hpbar .hpfill{height:100%; background:var(--hp); transition:width .4s steps(6);}
.hpbar.jimHp .hpfill{background:var(--green);}
#bossTaunt{font-size:22px; color:var(--parch); text-align:center; min-height:26px; margin-top:8px; font-style:normal;}
.hitFlash{animation:hitAnim .35s steps(2);}
@keyframes hitAnim{0%{filter:brightness(3) drop-shadow(3px 3px 0 rgba(0,0,0,.5));}100%{filter:brightness(1) drop-shadow(3px 3px 0 rgba(0,0,0,.5));}}
.shake{animation:screenShake .3s steps(4);}
@keyframes screenShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-5px,3px)}50%{transform:translate(5px,-3px)}75%{transform:translate(-3px,-2px)}}
.hintTxt{font-size:26px; letter-spacing:3px; color:var(--gold); line-height:1.4; word-spacing:8px;}
.gradeRow{display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap;}
.gradeBtn{font-family:'Press Start 2P',monospace; font-size:10px; border:4px solid #000; padding:12px 14px; cursor:pointer; box-shadow:0 4px 0 #000; color:#fff;}
.gradeBtn:active{transform:translateY(3px); box-shadow:0 1px 0 #000;}
.gNail{background:var(--green);}
.gAlmost{background:var(--gold2); color:#3a2100;}
.gMiss{background:var(--coral);}

/* ---------- Feedback / fx ---------- */
#toast{position:fixed; left:50%; top:38%; transform:translate(-50%,-50%); z-index:60;
  font-family:'Press Start 2P',monospace; font-size:clamp(13px,4vw,20px); color:var(--gold);
  text-shadow:3px 3px 0 #000; pointer-events:none; opacity:0;}
#toast.pop{animation:toastPop 1s steps(6) forwards;}
@keyframes toastPop{0%{opacity:0; transform:translate(-50%,-30%) scale(.4);}20%{opacity:1; transform:translate(-50%,-50%) scale(1.15);}40%{transform:translate(-50%,-50%) scale(1);}80%{opacity:1;}100%{opacity:0; transform:translate(-50%,-80%) scale(1);}}
.coinFx{position:fixed; z-index:55; font-size:24px; pointer-events:none; animation:coinFly 1s ease-out forwards;}
@keyframes coinFly{0%{opacity:1; transform:translateY(0) scale(1);}100%{opacity:0; transform:translateY(-110px) scale(1.4);}}
.centerCol{display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; padding:20px;}
.victoryStars{font-size:52px; letter-spacing:8px;}
.victoryStars .lit{color:var(--gold); text-shadow:2px 2px 0 var(--coral2), 4px 4px 0 #000;}
.victoryStars .dim{color:#3a4a5a;}
.rewardTxt{font-size:26px; color:var(--parch); line-height:1.3;}
.speechBubble{background:var(--white); color:var(--ink); border:4px solid #000; padding:10px 14px; font-size:24px; position:relative; max-width:420px; margin:0 auto 8px;}
.speechBubble::after{content:''; position:absolute; bottom:-14px; left:40px; border:8px solid transparent; border-top-color:#000;}
.smallNote{font-size:19px; color:#7fa8ba; margin-top:8px; line-height:1.2;}
/* ---------- Treasure Chest gallery & shop ---------- */
#chestBtn{cursor:pointer; background:var(--gold2); border:3px solid #000; color:#3a2100;
  font-family:'Press Start 2P',monospace; font-size:9px; padding:7px 9px; box-shadow:0 3px 0 #000;}
#chestBtn:active{transform:translateY(2px); box-shadow:0 1px 0 #000;}
.tabRow{display:flex; gap:10px; justify-content:center; margin:12px 0;}
.tabBtn{font-family:'Press Start 2P',monospace; font-size:10px; padding:10px 14px; border:4px solid #000;
  background:var(--sea); color:var(--white); cursor:pointer; box-shadow:0 4px 0 #000;}
.tabBtn.active{background:var(--gold2); color:#3a2100;}
.itemGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; padding:0 12px 30px; max-width:640px; margin:0 auto;}
.itemCard{background:var(--ocean2); border:4px solid #000; box-shadow:0 4px 0 rgba(0,0,0,.5); padding:10px 6px; text-align:center;}
.itemCard.owned{border-color:var(--gold2); box-shadow:0 4px 0 rgba(0,0,0,.5), 0 0 0 2px var(--gold2);}
.itemCard canvas{margin:4px auto; display:block;}
.itemCard.mystery canvas{filter:brightness(0) opacity(.55);}
.itemName{font-family:'Press Start 2P',monospace; font-size:8px; color:var(--gold); line-height:1.7; min-height:26px;}
.itemCard.mystery .itemName{color:#5d7a8a;}
.itemHow{font-size:17px; color:#8fb3c2; line-height:1.15; margin-top:4px;}
.buyBtn{font-family:'Press Start 2P',monospace; font-size:9px; margin-top:8px; padding:8px 10px;
  background:var(--green); color:#fff; border:3px solid #000; box-shadow:0 3px 0 #000; cursor:pointer;}
.buyBtn:active{transform:translateY(2px); box-shadow:0 1px 0 #000;}
.buyBtn.cant{background:#555; cursor:default;}
#chestCount{font-family:'Press Start 2P',monospace; font-size:9px; text-align:center; color:var(--seahi); margin-bottom:6px;}
/* award popup */
#awardOverlay{position:fixed; inset:0; z-index:80; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center;}
#awardBox{background:var(--ocean2); border:5px solid var(--gold2); box-shadow:0 0 0 4px #000, 0 10px 0 rgba(0,0,0,.6);
  padding:22px 26px; text-align:center; animation:awardPop .4s steps(4);}
@keyframes awardPop{0%{transform:scale(.3);}70%{transform:scale(1.12);}100%{transform:scale(1);}}
#awardBox h3{font-family:'Press Start 2P',monospace; font-size:13px; color:var(--gold); line-height:1.8; margin-bottom:8px;}
#awardBox canvas{margin:10px auto; display:block; animation:titleFloat 2s ease-in-out infinite;}
#awardBox .aname{font-family:'Press Start 2P',monospace; font-size:11px; color:var(--white); line-height:1.8; margin-bottom:14px;}
/* map life */
.flyer{position:absolute; z-index:7; pointer-events:none;}
.flyer canvas{animation:bob 1s ease-in-out infinite;}
.flyParrot{animation:flyAcross 18s linear infinite;}
.flyGull{animation:flyAcross 24s linear infinite reverse;}
@keyframes flyAcross{0%{left:-9%;}100%{left:105%;}}
.fireGlow canvas{animation:fireFlick .35s steps(2) infinite alternate;}

function drawSprite(name, scale, flip){
  const grid = SPRITES[name];
  const h = grid.length, w = Math.max(...grid.map(r=>r.length));
  const c = document.createElement('canvas');
  c.width = w*scale; c.height = h*scale;
  const ctx = c.getContext('2d');
  for(let y=0;y<h;y++){
    const row = grid[y];
    for(let x=0;x<row.length;x++){
      const col = PAL_BASE[row[x]];
      if(!col) continue;
      const dx = flip ? (w-1-x) : x;
      ctx.fillStyle = col;
      ctx.fillRect(dx*scale, y*scale, scale, scale);
    }
  }
  c.style.imageRendering = 'pixelated';
  return c;
}

/* ============ SPRITE UPGRADE PASS: detailed characters & scenery ============ */
// Programmatic character builder v2 -- SNES style: shading ramps, bigger heads, detailed coats
const HI_MAP={b:'c',B:'b',r:'a',R:'r',g:'e',G:'g',y:'i',Y:'y',x:'l',p:'v',P:'p',m:'l',M:'m',w:'l',s:'h'};
const SH_MAP={b:'B',B:'n',r:'z',R:'z',g:'f',G:'f',y:'j',Y:'j',x:'d',p:'u',P:'u',m:'M',M:'n',w:'x',s:'S'};
function genChar(o){
  const H=o.H||'B', C=o.C||'b', L=o.L||'p', E=o.eyes||'k';
  const h1=HI_MAP[H]||'w', h2=SH_MAP[H]||'k', c1=HI_MAP[C]||'w', c2=SH_MAP[C]||'k';
  const r=[];
  if(o.hat==='tricorn')      r.push("...kkkkkkkkk...", ".kkH11HHHH44kk.", "kHHkkkkkkkkkHHk");
  else if(o.hat==='bandana') r.push("....kkkkkkk....", "...kH11HH44k...", "..kH1HHHHHH4kk.");
  else if(o.hat==='wild')    r.push(".kk.kkkkkkk.kk.", "kHHkH11HH44kHHk", ".kHHHHHHHHH44k.");
  else if(o.hat==='bonnet')  r.push("...kkkkkkkkk...", "..kH11HHHH44k..", ".kHHHHHHHHH44k.");
  else                       r.push("....kkkkkkk....", "...kHH11H44k...", "...kHHHHHH4k...");
  if(o.blindfold) r.push("..kkkkkkkkkkk..");
  else r.push("..khw"+E+"sssw"+E+"Sk..");
  if(o.beard){ const X=o.beard;
    r.push("..kh"+X+"sssss"+X+"Sk..");
    r.push("..k"+X+X+X+"rr"+X+X+X+X+"k..");
    r.push("...k"+X+X+X+X+X+X+X+"k...");
  } else {
    r.push("..khsssssssSk..");
    r.push("..khssrrssssk..");
    r.push("...ksssssssk...");
  }
  r.push(".....ksssk.....");
  if(o.dress){
    r.push(".k2CCCCCCCCC3k.");
    r.push(".k2sCCCiCCCs3k.");
    r.push(".k2CCCCCCCCC3k.");
    r.push("k2CCCCCCCCCCC3k");
    r.push("kCCCCCCCCCCCCCk");
    r.push(".kkkkkkkkkkkkk.");
    r.push("..kssk...kssk..");
  } else {
    r.push(".k22CCCCCCC33k.");
    r.push(".k2sCCCiCCCs3k.");
    r.push(".k2sCCCCCCCs3k.");
    r.push(".k2hCCCiCCCh3k.");
    r.push("..kkkkkikkkkk..");
    if(o.pegleg){ r.push("..kLLLk..kuk...", "..kPPPk..kuk...", ".kkkkkk..kuk..."); }
    else        { r.push("..kLLLk.kLLLk..", "..kPPPk.kPPPk..", ".kkkkkk.kkkkkk."); }
  }
  let rows = r.map(x=>x.replace(/H/g,H).replace(/1/g,h1).replace(/4/g,h2).replace(/C/g,C).replace(/2/g,c1).replace(/3/g,c2).replace(/L/g,L));
  if(o.scar && !o.blindfold) rows[3]=rows[3].slice(0,11)+'z'+rows[3].slice(12);
  if(o.parrot){ rows[7]=rows[7].slice(0,10)+'ego'+rows[7].slice(13); rows[8]=rows[8].slice(0,14)+'g'; }
  if(o.crutch){ rows[8]=rows[8]+'.uu'; for(let i=9;i<=15;i++){ if(rows[i]) rows[i]=rows[i]+'..u'; } }
  return rows;
}

// 1883 England scenery -- shaded brick, glowing windows
function genBuilding(wall, roof, w, h){
  const rHi = HI_MAP[roof]||'l', wSh = SH_MAP[wall]||'d';
  const rows=['.'+'k'.repeat(w-2)+'.', 'k'+rHi.repeat(w-2)+'k', 'k'+roof.repeat(w-2)+'k', 'k'.repeat(w)];
  for(let y=0;y<h;y++){
    let rr='k';
    for(let x=1;x<w-2;x++) rr += ((x%3===1)&&(y%2===0)) ? 'i' : wall;
    rows.push(rr+wSh+'k');
  }
  const half=Math.floor((w-2)/2);
  const door='k'+wall.repeat(half-1)+'uu'+wall.repeat(w-2-half-2)+wSh+'k';
  rows.push(door, door, 'k'.repeat(w));
  return rows;
}

/* ================= SOUND (chiptune bleeps) ================= */
let AC=null, soundOn=true;
function ac(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq, dur, type, vol, when){
  if(!soundOn) return;
  try{
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.12, a.currentTime+(when||0));
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+(when||0)+dur);
    o.connect(g); g.connect(a.destination);
    o.start(a.currentTime+(when||0)); o.stop(a.currentTime+(when||0)+dur+0.02);
  }catch(e){}
}
const SFX = {
  tap:()=>beep(520,.06,'square',.08),
  good:()=>{beep(660,.09); beep(880,.12,'square',.12,.09);},
  great:()=>{beep(523,.08); beep(659,.08,'square',.12,.08); beep(784,.09,'square',.12,.16); beep(1047,.2,'square',.13,.24);},
  bad:()=>{beep(180,.2,'sawtooth',.1); beep(140,.25,'sawtooth',.1,.1);},
  coin:()=>{beep(988,.06,'square',.1); beep(1319,.18,'square',.1,.06);},
  hit:()=>{beep(220,.08,'sawtooth',.14); beep(110,.14,'sawtooth',.12,.06);},
  fanfare:()=>{[523,659,784,1047,784,1047].forEach((f,i)=>beep(f,.14,'square',.12,i*.13));},
  swoosh:()=>beep(340,.1,'triangle',.1)
};
/* ---- 8-bit sea shanty (Drunken Sailor, traditional) ---- */
const N = {D2:73.42,C2:65.41,F2:87.31,G2:98.00,A2:110.00,C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00};
// 32 eighth-note steps per loop
const SHANTY_MEL = [
  N.D4,N.D4,N.D4,N.D4, N.D4,N.E4,N.F4,N.D4,
  N.C4,N.C4,N.C4,N.C4, N.C4,N.D4,N.E4,N.C4,
  N.D4,N.E4,N.F4,N.G4, N.A4,N.A4,N.G4,N.F4,
  N.E4,N.C4,N.D4,0,    N.D4,0,N.A3,0
];
const SHANTY_BASS = [ // one note per 2 steps
  N.D3,N.D2,N.D3,N.D2, N.C3,N.C2,N.C3,N.C2,
  N.D3,N.D2,N.F3,N.G3, N.C3,N.C3,N.D3,N.D2
];
let musicGain=null, musicTimer=null, musicStarted=false;
function musicNote(freq, when, dur, type, vol){
  const a=ac(), o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001, when);
  g.gain.linearRampToValueAtTime(vol, when+0.02);
  g.gain.exponentialRampToValueAtTime(0.001, when+dur);
  o.connect(g); g.connect(musicGain);
  o.start(when); o.stop(when+dur+0.05);
}
function scheduleShanty(){
  if(!musicStarted) return;
  const a=ac(), step=0.205, t0=a.currentTime+0.08;
  SHANTY_MEL.forEach((f,i)=>{ if(f) musicNote(f, t0+i*step, step*0.92, 'square', 0.05); });
  SHANTY_BASS.forEach((f,i)=>{ if(f) musicNote(f, t0+i*step*2, step*1.7, 'triangle', 0.09); });
  // little off-beat "concertina" chirp
  for(let i=1;i<32;i+=4) musicNote(N.A3, t0+i*step, step*0.4, 'square', 0.018);
  musicTimer = setTimeout(scheduleShanty, (32*step-0.1)*1000);
}
function startMusic(){
  if(musicStarted) return;
  const a=ac();
  musicGain = a.createGain(); musicGain.gain.value = soundOn?1:0; musicGain.connect(a.destination);
  musicStarted = true; scheduleShanty();
}
function splashSound(){
  if(!soundOn) return;
  try{
    const a=ac(), len=a.sampleRate*0.35, buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=a.createBufferSource(); src.buffer=buf;
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
    const g=a.createGain(); g.gain.value=0.25;
    src.connect(f); f.connect(g); g.connect(a.destination); src.start();
    beep(160,.3,'sine',.1); beep(90,.4,'sine',.09,.08);
  }catch(e){}
}
document.getElementById('soundToggle').onclick = function(){
  soundOn=!soundOn; this.textContent = soundOn ? '♪ ON' : '♪ OFF';
  if(musicGain) musicGain.gain.value = soundOn?1:0;
  if(soundOn) SFX.coin();
};

<script>
/* ================= GAME ENGINE ================= */

let state = {

function save(){ try{ localStorage.setItem('jimQuestTI', JSON.stringify(state)); }catch(e){} }
function load(){
  try{ const s = localStorage.getItem('jimQuestTI'); if(s) state = Object.assign(state, JSON.parse(s)); }catch(e){}
  LEVELS.forEach(l=>{ if(!state.levels[l.id]) state.levels[l.id] = {learn:false, drop:false, build:false, stars:0, bestNailed:0}; });
}
load();

function totalStars(){ return LEVELS.reduce((a,l)=>a+(state.levels[l.id].stars||0),0); }
function masteredLines(){ return LEVELS.reduce((a,l)=>a+(state.levels[l.id].bestNailed||0),0); }
function levelUnlocked(i){ return true; } // every level open -- play in any order!

function updateHUD(){
  $('#coinVal').textContent = state.coins;
  $('#streakVal').textContent = state.streak;
  $('#starVal').textContent = totalStars();

  $('#masteryFill').style.width = pct+'%';

}
function toast(msg, color){

  t.classList.remove('pop'); void t.offsetWidth; t.classList.add('pop');
}
function coinBurst(n, x, y){
  for(let i=0;i<n;i++){
    const c = document.createElement('div'); c.className='coinFx'; c.textContent='🪙';
    c.style.left = (x + (Math.random()*80-40))+'px'; c.style.top = (y + (Math.random()*20-10))+'px';
    c.style.animationDelay = (i*0.07)+'s';

}
function addCoins(n, ev){
  state.coins += n; updateHUD(); SFX.coin();

}
function bumpStreak(){ state.streak++; if(state.streak>state.bestStreak) state.bestStreak=state.streak; if(state.streak>0 && state.streak%5===0){ toast('🔥 '+state.streak+' STREAK!','#ff8c42'); SFX.great(); state.coins+=5; } updateHUD(); }
function breakStreak(){ state.streak=0; updateHUD(); }

/* ---------- text helpers ---------- */
function words(s){ return s.split(/\s+/).filter(Boolean); }
function firstLetters(s){
  return words(s).map(w=>{
    const m = w.match(/^([^A-Za-z]*)([A-Za-z])(.*)$/);
    if(!m) return w;
    return m[1]+m[2]+m[3].replace(/[A-Za-z]/g,'_');
  }).join(' ');
}
function splitChunks(line, maxWords){
  // split on sentence-ish punctuation, then merge small pieces
  const parts = line.match(/[^.!?…]+[.!?…]*(\s|$)/g) || [line];
  const out = [];
  parts.forEach(p=>{
    p = p.trim(); if(!p) return;
    const ws = words(p);
    if(ws.length <= maxWords){ out.push(p); }
    else {
      for(let i=0;i<ws.length;i+=maxWords) out.push(ws.slice(i,i+maxWords).join(' '));
    }
  });
  // merge tiny fragments into neighbors
  const merged=[];
  out.forEach(p=>{
    if(merged.length && words(p).length<=2 && words(merged[merged.length-1]).length+words(p).length<=maxWords+2)
      merged[merged.length-1]+=' '+p;
    else merged.push(p);
  });
  return merged;
}
function battleCards(level){
  // big lines become chained chunks (memorization by chaining)
  const cards=[];
  level.lines.forEach((L,idx)=>{
    if(L.big){
      const ch = splitChunks(L.line, 16);
      ch.forEach((c,i)=>{
        cards.push({cue: i===0 ? L.cue : '(...keep going! You just said: "...'+words(ch[i-1]).slice(-5).join(' ')+'")', line:c, lineIdx:idx, part:i+1, parts:ch.length});
      });
    } else cards.push({cue:L.cue, line:L.line, lineIdx:idx});
  });
  return cards;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ---------- STAGE 2: WORD DROP ---------- */
function pickBlanks(lineWords){
  const n = lineWords.length;
  const count = n<=5 ? 1 : n<=12 ? 2 : 3;
  // prefer longer, meaningful words
  const idxs = lineWords.map((w,i)=>({w:w.replace(/[^A-Za-z']/g,''),i}))
    .filter(o=>o.w.length>=3)
    .sort((a,b)=>b.w.length-a.w.length)
    .slice(0, count*2);
  const chosen = shuffle(idxs).slice(0,count).map(o=>o.i).sort((a,b)=>a-b);
  return chosen.length?chosen:[0];
}
function playDrop(idx){
  const l = LEVELS[idx];
  const order = shuffle(l.lines.map((_,i)=>i));
  const pool = [];
  l.lines.forEach(L=>words(L.line).forEach(w=>{ const c=w.replace(/[^A-Za-z']/g,''); if(c.length>=3) pool.push(c); }));
  let i=0;
  function step(){
    if(i>=order.length){
      state.levels[l.id].drop = true; save();
      return stageDone(idx, '🧩 WORD DROP COMPLETE!', 'Every missing word found! +15 🪙<br>Now try LINE BUILDER!', 15);
    }
    const L = l.lines[order[i]];
    const ws = words(L.line);
    const blanks = pickBlanks(ws);
    let active = 0;
    show(playHeader(l, '🧩 WORD DROP', i, order.length));
    function render(){
      const lineHtml = ws.map((w,wi)=>{
        const b = blanks.indexOf(wi);
        if(b===-1) return esc(w);
        if(b<active) return `<span class="blankSlot filledOk">${esc(w)}</span>`;
        if(b===active) return `<span class="blankSlot">???</span>`;
        return `<span class="blankSlot">&nbsp;</span>`;
      }).join(' ');
      const answer = ws[blanks[active]].replace(/[^A-Za-z']/g,'') || ws[blanks[active]];
      let opts = [answer];
      let guard=0;
      while(opts.length<3 && guard<200){
        guard++;
        const cand = pool[Math.floor(Math.random()*pool.length)];
        if(cand && cand.toLowerCase()!==answer.toLowerCase() && !opts.some(o=>o.toLowerCase()===cand.toLowerCase())) opts.push(cand);
      }
      while(opts.length<3) opts.push('pirate');
      opts = shuffle(opts);
      $('#playBody').innerHTML = `
        <div class="cueBox"><div class="cueTag">🎭 YOUR CUE</div><div class="cueTxt">${esc(L.cue)}</div></div>
        <div class="lineBox"><div class="lineTag">⭐ FILL IN JIM'S LINE (${active+1}/${blanks.length}):</div><div class="lineTxt">${lineHtml}</div></div>
        <div class="chipRow">${opts.map(o=>`<button class="chip" data-w="${esc(o)}">${esc(o)}</button>`).join('')}</div>`;
      document.querySelectorAll('.chip').forEach(ch=>{
        ch.onclick = (e)=>{
          if(ch.dataset.w.toLowerCase()===answer.toLowerCase()){
            SFX.good(); bumpStreak(); addCoins(1,e);
            active++;
            if(active>=blanks.length){ toast('LINE COMPLETE!'); i++; setTimeout(step,500); }
            else render();
          } else {
            SFX.bad(); breakStreak(); ch.classList.add('wrongFlash','used');
            setTimeout(()=>ch.classList.remove('wrongFlash'),350);
          }
        };
      });
    }
    render();
  }
  step();
}

/* ---------- STAGE 3: LINE BUILDER ---------- */
function playBuild(idx){
  const l = LEVELS[idx];
  const order = shuffle(l.lines.map((_,i)=>i));
  let i=0;
  function step(){
    if(i>=order.length){
      state.levels[l.id].build = true; save();
      return stageDone(idx, '🔨 LINE BUILDER COMPLETE!', 'You rebuilt every line! +20 🪙<br>Time for the BOSS BATTLE! ⚔️', 20);
    }
    const L = l.lines[order[i]];
    const ws = words(L.line);
    const pieces = ws.length<=9 ? ws : splitChunks(L.line, Math.ceil(ws.length/Math.min(8,Math.ceil(ws.length/4))));
    let next=0;
    show(playHeader(l, '🔨 LINE BUILDER', i, order.length));
    const trayOrder = shuffle(pieces.map((_,pi)=>pi));
    $('#playBody').innerHTML = `
      <div class="cueBox"><div class="cueTag">🎭 YOUR CUE</div><div class="cueTxt">${esc(L.cue)}</div></div>
      <div class="lineBox"><div class="lineTag">⭐ TAP THE PIECES IN ORDER:</div><div class="buildLine" id="buildOut"></div></div>
      <div class="tileTray" id="tray">${trayOrder.map(pi=>`<button class="chip" data-pi="${pi}">${esc(pieces[pi])}</button>`).join('')}</div>`;
    document.querySelectorAll('#tray .chip').forEach(ch=>{
      ch.onclick=(e)=>{
        if(+ch.dataset.pi===next){
          SFX.tap(); ch.classList.add('used');
          $('#buildOut').innerHTML += `<span class="placed">${esc(pieces[next])} </span>`;
          next++;
          if(next>=pieces.length){ SFX.good(); bumpStreak(); addCoins(2,e); toast('BUILT IT!'); i++; setTimeout(step,600); }
        } else {
          SFX.bad(); breakStreak(); ch.classList.add('wrongFlash');
          setTimeout(()=>ch.classList.remove('wrongFlash'),350);
        }
      };
    });
  }
  step();
}

function playBattle(idx){

  const LEVEL_BG = {inn:'bt-wood', blackdog:'bt-wood', pew:'bt-storm', blackspot:'bt-storm', seachest:'bt-attic', squire:'bt-study', hispaniola:'bt-deck', barrel:'bt-hold', captain:'bt-deck', gunn:'bt-jungle', silvercamp:'bt-camp', cave:'bt-cave'};

  let cards = shuffle(battleCards(l));
  const totalCards = cards.length;
  let bossHP = 100, firstTry = {}, nailedFirst = 0, attempted = {};
  const dmg = Math.ceil(100/totalCards);
  function render(){
    if(cards.length===0 || bossHP<=0) return victory();
    const card = cards[0];
    show(`<div id="playWrap">
      <div id="stageHeader"><div id="stageName">⚔️ BOSS BATTLE</div><div id="lineCount">${totalCards-cards.length+1}/${totalCards}</div></div>

        </div>
        <div id="bossTaunt">"${esc(l.taunts[Math.floor(Math.random()*l.taunts.length)])}"</div>
      </div>
      <div class="cueBox"><div class="cueTag">🎭 YOUR CUE ${card.part?('· BIG SPEECH PART '+card.part+'/'+card.parts):''}</div><div class="cueTxt">${esc(card.cue)}</div></div>

      <div class="gradeRow" id="gradeRow" style="display:none;">
        <button class="gradeBtn gNail">💥 NAILED IT!</button>
        <button class="gradeBtn gAlmost">😅 ALMOST</button>
        <button class="gradeBtn gMiss">❌ MISSED IT</button>
      </div>
      <div class="smallNote" style="text-align:center;">Be honest, matey -- honest actors learn fastest!</div>
    </div>`);
    $('#jimSpr').appendChild(drawSprite('jim',6));
    $('#bossSpr').appendChild(drawSprite(l.sprite,6,true));
    const key = card.lineIdx+'_'+(card.part||0);
    $('#hintBtn').onclick=()=>{ SFX.tap(); $('#battleLine').innerHTML = `<span class="hintTxt">${esc(firstLetters(card.line))}</span>`; };
    $('#revealBtn').onclick=()=>{
      SFX.swoosh();
      $('#battleLine').innerHTML = esc(card.line); $('#battleLine').style.color='var(--white)';
      $('#gradeRow').style.display='flex';
      $('#revealBtn').style.display='none';
    };
    document.querySelector('.gNail').onclick=(e)=>{
      SFX.hit(); bossHP = Math.max(0,bossHP-dmg);
      if(!(key in attempted)){ nailedFirst++; }
      attempted[key]=true;
      bumpStreak(); addCoins(3,e);
      $('#bossSpr').classList.add('hitFlash'); $('#battleArena').classList.add('shake');
      $('#bossFill').style.width=bossHP+'%';
      toast(l.cheers[Math.floor(Math.random()*l.cheers.length)], 'var(--green)');
      cards.shift();
      setTimeout(render, 700);
    };
    document.querySelector('.gAlmost').onclick=()=>{
      SFX.good(); attempted[key]=true; bossHP = Math.max(0,bossHP-Math.ceil(dmg/2));
      $('#bossFill').style.width=bossHP+'%';

      setTimeout(render, 800);

  function victory(){
    const uniqueLines = l.lines.length;

    <h3 style="font-family:'Press Start 2P',monospace; color:var(--gold); font-size:14px; line-height:1.9;">${title}</h3>
    <div class="rewardTxt">${msg}</div>
    <div class="ctrlRow"><button class="bigBtn green" id="dNext">ONWARD! ▶</button></div>
  </div>`);
  $('#dSpr').appendChild(drawSprite('jim',8));
  $('#dNext').onclick=()=>{SFX.tap(); showLevel(idx);};
}

/* waves */
for(let i=0;i<7;i++){ const w=document.createElement('div'); w.className='wave';
  w.style.left=(Math.random()*95)+'%'; w.style.top=(Math.random()*95)+'%';
  w.style.animationDelay=(Math.random()*3)+'s'; document.body.appendChild(w); }

showTitle();
</script>
</body>
</html>
