<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Command Center</title>
<style>
  :root{
    --ink:#0E1116;
    --panel:#161B22;
    --raised:#1C232C;
    --raised2:#222B36;
    --line:#2A323D;
    --text:#E8E6E1;
    --muted:#9BA4B0;
    --faint:#6B7480;
    --brass:#C8A45C;
    --brass-dim:#8A7642;
    --sage:#74B98C;
    --amber:#E0A33E;
    --danger:#E06B6B;
    --info:#7A9BD4;
    --serif:Georgia,'Iowan Old Style','Times New Roman',serif;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding-bottom:60px;line-height:1.5}
  a{color:inherit}
  ::selection{background:var(--brass);color:#0E1116}

  /* Header */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(14,17,22,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:18px 22px 10px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
  .brand h1{font-family:var(--serif);font-weight:500;font-size:24px;letter-spacing:0.3px}
  .brand h1 .glyph{color:var(--brass)}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1.5px;text-transform:uppercase}
  .savechip{font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;align-items:center;gap:6px}
  .savechip .dot{width:7px;height:7px;border-radius:50%;background:var(--sage);box-shadow:0 0 8px var(--sage)}
  .savechip.dirty .dot{background:var(--amber);box-shadow:0 0 8px var(--amber)}

  /* Tabs */
  .tabs{display:flex;gap:2px;max-width:1180px;margin:0 auto;padding:0 14px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13.5px;font-weight:500;padding:11px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--brass);border-bottom-color:var(--brass)}

  /* Layout */
  .wrap{max-width:1180px;margin:0 auto;padding:22px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
  .sec-title{font-family:var(--serif);font-weight:500;font-size:20px;margin-bottom:4px}
  .sec-note{color:var(--muted);font-size:13.5px;margin-bottom:18px}

  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:880px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.g2,.g3,.g4{grid-template-columns:1fr}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .card.tight{padding:14px}
  .card .label{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .stat{font-family:var(--mono);font-size:26px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-0.5px}
  .stat.sm{font-size:20px}
  .stat.lg{font-size:34px}
  .pos{color:var(--sage)}.neg{color:var(--danger)}.warnc{color:var(--amber)}.brassc{color:var(--brass)}
  .sub2{font-size:12px;color:var(--muted);margin-top:6px;font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* Money input */
  .num-input{font-family:var(--mono);font-variant-numeric:tabular-nums;background:transparent;border:none;border-bottom:1px dashed var(--line);color:var(--text);font-size:14px;padding:2px 2px;width:108px;text-align:right;transition:border-color .15s}
  .num-input:focus{outline:none;border-bottom-color:var(--brass);color:var(--brass)}
  .num-input.wide{width:130px}
  .txt-input{font-family:var(--sans);background:transparent;border:none;border-bottom:1px dashed var(--line);color:var(--text);font-size:14px;padding:2px;width:100%}
  .txt-input:focus{outline:none;border-bottom-color:var(--brass)}
  .day-input{width:44px}

  /* Rows */
  .rowlist{display:flex;flex-direction:column}
  .rrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .rrow:last-child{border-bottom:none}
  .rrow .nm{flex:1;min-width:0}
  .rrow .nm .t{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rrow .nm .d{font-size:11.5px;color:var(--faint);font-family:var(--mono);margin-top:2px}
  .pill{font-family:var(--mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .pill.red{color:var(--danger);border-color:rgba(224,107,107,.4);background:rgba(224,107,107,.08)}
  .pill.amber{color:var(--amber);border-color:rgba(224,163,62,.4);background:rgba(224,163,62,.08)}
  .pill.green{color:var(--sage);border-color:rgba(116,185,140,.4);background:rgba(116,185,140,.08)}
  .pill.brass{color:var(--brass);border-color:rgba(200,164,92,.4);background:rgba(200,164,92,.08)}
  .xbtn{background:none;border:none;color:var(--faint);cursor:pointer;font-size:18px;line-height:1;padding:4px 6px;border-radius:6px}
  .xbtn:hover{color:var(--danger);background:var(--raised)}
  .addbtn{margin-top:14px;background:var(--raised);border:1px dashed var(--line);color:var(--muted);font-family:var(--sans);font-size:13px;padding:9px 14px;border-radius:9px;cursor:pointer;width:100%}
  .addbtn:hover{border-color:var(--brass);color:var(--brass)}

  /* Meter */
  .meter{height:8px;border-radius:6px;background:var(--raised);overflow:hidden;margin-top:8px}
  .meter > span{display:block;height:100%;border-radius:6px;transition:width .3s,background .3s}

  /* Alert banners */
  .alert{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:11px;border:1px solid;margin-bottom:10px}
  .alert.red{border-color:rgba(224,107,107,.45);background:rgba(224,107,107,.07)}
  .alert.amber{border-color:rgba(224,163,62,.42);background:rgba(224,163,62,.07)}
  .alert .ic{font-family:var(--mono);font-weight:700;font-size:13px;margin-top:1px}
  .alert.red .ic{color:var(--danger)}
  .alert.amber .ic{color:var(--amber)}
  .alert .body{flex:1}
  .alert .body b{font-weight:600}
  .alert .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600}

  /* Donut + legend */
  .donutwrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .donut{width:150px;height:150px;border-radius:50%;flex:0 0 auto;position:relative}
  .donut::after{content:"";position:absolute;inset:26px;border-radius:50%;background:var(--panel)}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
  .donut .center .v{font-family:var(--mono);font-weight:600;font-size:17px}
  .donut .center .l{font-size:10px;color:var(--faint);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
  .legend{flex:1;min-width:180px;display:flex;flex-direction:column;gap:7px}
  .legend .li{display:flex;align-items:center;gap:9px;font-size:13px}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .legend .li .nm{flex:1;color:var(--muted)}
  .legend .li .vl{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* Calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .calhead .mo{font-family:var(--serif);font-size:20px}
  .navbtn{background:var(--raised);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px}
  .navbtn:hover{border-color:var(--brass);color:var(--brass)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .dow{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);text-align:center;padding-bottom:4px}
  .cell{min-height:78px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:6px;position:relative;overflow:hidden}
  .cell.empty{background:transparent;border-color:transparent}
  .cell.today{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass) inset}
  .cell .dn{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px}
  .cell.today .dn{color:var(--brass);font-weight:700}
  .ev{font-size:10.5px;line-height:1.25;padding:2px 5px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
  .ev.b{background:rgba(200,164,92,.13);color:var(--brass)}
  .ev.r{background:rgba(224,107,107,.14);color:var(--danger)}
  .ev.a{background:rgba(224,163,62,.14);color:var(--amber)}
  @media(max-width:560px){.cell{min-height:60px}.ev{font-size:9px;padding:1px 3px}.cell .dn{font-size:10px}}

  .splitbar{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:10px 0}
  .splitbar > span{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:#0E1116;font-weight:600;min-width:0}

  .kvtable{width:100%;border-collapse:collapse}
  .kvtable td{padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .kvtable td:last-child{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .kvtable tr:last-child td{border-bottom:none}

  .note{font-size:12.5px;color:var(--faint);margin-top:12px;line-height:1.55}
  .note b{color:var(--muted)}
  .hr{height:1px;background:var(--line);margin:20px 0;border:none}
  .ghostbtn{background:var(--raised);border:1px solid var(--line);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer}
  .ghostbtn:hover{border-color:var(--brass);color:var(--brass)}
  .ghostbtn.warn:hover{border-color:var(--danger);color:var(--danger)}
  .flexbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

  /* Budget category nav */
  .catnav{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
  .catnav::-webkit-scrollbar{display:none}
  .catchip{flex:0 0 auto;display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-family:var(--sans);font-size:13px;padding:9px 13px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .catchip svg{opacity:.8}
  .catchip:hover{color:var(--text);border-color:var(--faint)}
  .catchip.active{color:var(--cc);border-color:var(--cc);background:rgba(255,255,255,.025)}
  .cathead{display:flex;align-items:center;gap:12px}
  .catic{display:flex;width:40px;height:40px;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;flex:0 0 auto}
  .catrow{display:flex;align-items:center;gap:12px;width:100%;background:none;border:none;border-bottom:1px solid var(--line);padding:11px 2px;cursor:pointer;color:var(--text);text-align:left}
  .catrow:last-child{border-bottom:none}
  .catrow:hover{background:var(--raised)}
  .catic2{display:flex;color:var(--muted);flex:0 0 22px}
  .crname{flex:0 0 130px;font-size:14px;font-weight:500}
  .crbar{flex:1;height:8px;background:var(--raised);border-radius:6px;overflow:hidden}
  .crbar>span{display:block;height:100%;border-radius:6px}
  .cramt{font-family:var(--mono);font-variant-numeric:tabular-nums;min-width:72px;text-align:right}
  @media(max-width:560px){.crname{flex:0 0 92px;font-size:13px}}

  /* Recommendation cards */
  .reccard{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
  .recnum{font-family:var(--serif);font-size:20px;color:var(--faint);flex:0 0 20px;line-height:1.3}
  .recic{flex:0 0 40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid var(--line)}
  .recic.red{color:var(--danger)}.recic.amber{color:var(--amber)}.recic.info{color:var(--info)}.recic.brass{color:var(--brass)}
  .recbody{flex:1;min-width:0}
  .rectitle{font-weight:600;font-size:15px;margin-bottom:5px}
  .rectext{color:var(--muted);font-size:13.5px;line-height:1.55}
  .recimpact{display:inline-block;margin-top:9px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--brass);border:1px solid rgba(200,164,92,.4);background:rgba(200,164,92,.08);padding:3px 9px;border-radius:20px}

  /* Sliders */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;background:var(--raised);outline:none;margin:4px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--brass);cursor:pointer;border:4px solid var(--ink);box-shadow:0 0 0 1px var(--brass)}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:4px solid var(--ink);border-radius:50%;background:var(--brass);cursor:pointer;box-shadow:0 0 0 1px var(--brass)}
  .slabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:10px}
  .slabel .v{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums}
  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .minichip{background:var(--raised);border:1px solid var(--line);color:var(--muted);font-size:12px;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  .minichip:hover{border-color:var(--brass);color:var(--brass)}
</style>
</head>
<body>
  <header class="topbar">

<script>
//////////////////// DEFAULT DATA ////////////////////
const DEFAULTS = {
  meta:{ updated:"2026-06-19", varVer:2 },

//////////////////// STATE + PERSISTENCE ////////////////////
const KEY = "fcc_state_v1";
let state = null;
let canPersist = (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function");
let saveTimer = null;

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

async function loadState(){
  if(canPersist){
    try{
      const res = await window.storage.get(KEY);
      if(res && res.value){ state = JSON.parse(res.value); return; }
    }catch(e){ /* key missing, fall through */ }
  }
  state = deepClone(DEFAULTS);
  await saveState(true);
}
async function saveState(silent){
  if(!silent) markDirty();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    if(canPersist){
      try{ await window.storage.set(KEY, JSON.stringify(state)); }catch(e){}
    }
    markSaved();
  }, 250);
}
function markDirty(){ const c=document.getElementById("savechip"); const t=document.getElementById("savetext"); if(c){c.classList.add("dirty"); t.textContent="Saving";} }
function markSaved(){ const c=document.getElementById("savechip"); const t=document.getElementById("savetext"); if(c){c.classList.remove("dirty"); t.textContent = canPersist ? "Saved" : "Session only";} }

//////////////////// HELPERS ////////////////////
const $ = (id)=>document.getElementById(id);
function fmt(n){ n = Number(n)||0; return (n<0?"-$":"$") + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt0(n){ n = Number(n)||0; return (n<0?"-$":"$") + Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); }
function pct(n){ return (Math.round(n*10)/10) + "%"; }
function parseNum(v){ const x = parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(x)?0:x; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const TODAY = new Date(2026,5,19); // Jun 19 2026 reference

//////////////////// DERIVED MATH ////////////////////
function monthlyBill(b){ return (b.freq==="quarterly") ? (Number(b.amount)||0)/3 : (Number(b.amount)||0); }
function compute(){
  const inc = state.income;
  const incomeTotal = (inc.takeHome1||0)+(inc.takeHome2||0)+(inc.fsa1||0)+(inc.fsa2||0)+(inc.childSupport||0);
  const billsMonthly = state.bills.reduce((s,b)=>s+monthlyBill(b),0);
  const VLABELS={groceries:"Groceries",dining:"Dining & coffee",gas:"Gas",shopping:"Shopping & home",subscriptions:"Subscriptions & apps",entertainment:"Entertainment & travel",other:"Other"};
  const variable = Object.values(state.variable).reduce((s,x)=>s+(Number(x)||0),0);
  const outflow = billsMonthly + variable;
  const leftover = incomeTotal - outflow;

  const revolving = state.debts.filter(d=>d.type==="revolving");
  const consumerDebt = state.debts.reduce((s,d)=>s+(Number(d.balance)||0),0);
  const minPayments = state.debts.reduce((s,d)=>s+(Number(d.minPayment)||0),0);
  const ccLimit = revolving.reduce((s,d)=>s+(Number(d.limit)||0),0);
  const ccBalance = revolving.reduce((s,d)=>s+(Number(d.balance)||0),0);
  const utilization = ccLimit>0 ? (ccBalance/ccLimit*100) : 0;

  const cashTotal = state.cash.reduce((s,a)=>s+(Number(a.balance)||0),0);
  const retireTotal = state.retirement.reduce((s,a)=>s+(Number(a.balance)||0),0);
  const m = state.mortgage;
  const homeValue = (Number(m.equity)||0)+(Number(m.balance)||0);

  const assets = homeValue + cashTotal + retireTotal;
  const liabilities = (Number(m.balance)||0) + consumerDebt;
  const netWorth = assets - liabilities;

  // category breakdown for budget donut (fixed bill cats + variable cats)
  const cats = {};
  state.bills.forEach(b=>{ cats[b.cat]=(cats[b.cat]||0)+monthlyBill(b); });
  Object.keys(state.variable).forEach(k=>{ const v=Number(state.variable[k])||0; if(v>0){ const lbl=VLABELS[k]; cats[lbl]=(cats[lbl]||0)+v; } });

  return {incomeTotal,billsMonthly,variable,outflow,leftover,consumerDebt,minPayments,ccLimit,ccBalance,utilization,cashTotal,retireTotal,homeValue,assets,liabilities,netWorth,cats};
}

//////////////////// EDITABLE INPUT WIRING ////////////////////
// inputs carry data-path like "income.takeHome1" or "bill.b_water.amount"
function bindInputs(scope){
  scope.querySelectorAll("[data-path]").forEach(el=>{
    el.addEventListener("focus", e=>{ if(el.select) el.select(); });
    el.addEventListener("input", e=>{
      const path = el.getAttribute("data-path");
      const isNum = el.getAttribute("data-type")!=="text";
      const val = isNum ? parseNum(el.value) : el.value;
      applyPath(path, val);
      saveState();
      sync();
    });
  });
}
function applyPath(path, val){
  const parts = path.split(".");
  if(parts[0]==="income"){ state.income[parts[1]] = val; return; }
  if(parts[0]==="variable"){ state.variable[parts[1]] = val; return; }
  if(parts[0]==="mortgage"){ state.mortgage[parts[1]] = val; return; }
  if(parts[0]==="contrib"){ state.contrib[parts[1]] = val; return; }
  if(parts[0]==="sell"){ state.sell[parts[1]] = val; return; }
  if(parts[0]==="sellcost"){ const c=state.sell.costs.find(x=>x.id===parts[1]); if(c) c[parts[2]]=val; return; }
  if(parts[0]==="sellpay"){ state.sell.payoff[parts[1]]=state.sell.payoff[parts[1]]||{}; state.sell.payoff[parts[1]][parts[2]]=val; return; }
  if(parts[0]==="bill"){ const b=state.bills.find(x=>x.id===parts[1]); if(b) b[parts[2]]=val; return; }
  if(parts[0]==="debt"){ const d=state.debts.find(x=>x.id===parts[1]); if(d) d[parts[2]]=val; return; }
  if(parts[0]==="cash"){ const a=state.cash.find(x=>x.id===parts[1]); if(a) a[parts[2]]=val; return; }
  if(parts[0]==="ret"){ const a=state.retirement.find(x=>x.id===parts[1]); if(a) a[parts[2]]=val; return; }
  if(parts[0]==="affirm"){ const a=state.affirm.find(x=>x.id===parts[1]); if(a) a[parts[2]]=val; return; }
}

function syncOverview(){

  if(!$("ov_net")) return;

  $("ov_net").className = "stat " + (c.netWorth>=0?"pos":"neg");

  $("ov_var").textContent = fmt(c.variable);
  $("ov_left2").textContent = fmt(c.leftover);
  $("ov_left2").className = c.leftover>=0?"pos":"neg";

  // flow bar
  const flow=$("ov_flow");
  const tot = Math.max(c.incomeTotal, c.outflow, 1);
  const fixedW = c.billsMonthly/tot*100, varW=c.variable/tot*100, leftW=Math.max(0,c.leftover)/tot*100;
  flow.innerHTML =
    `<span style="width:${fixedW}%;background:var(--brass)">${fixedW>14?"Bills":""}</span>`+
    `<span style="width:${varW}%;background:var(--amber)">${varW>14?"Variable":""}</span>`+
    `<span style="width:${leftW}%;background:var(--sage)">${leftW>14?"Leftover":""}</span>`;

  // alerts
  const al=$("ov_alerts"); let html="";
  state.affirm.filter(a=>a.status==="overdue").forEach(a=>{
    html += `<div class="alert red"><div class="ic">!</div><div class="body"><b>${esc(a.name)} is overdue.</b> Payment of <span class="amt">${fmt(a.amount)}</span> was due ${fmtDate(a.due)}.</div></div>`;
  });
  state.debts.filter(d=>d.limit>0 && d.balance>d.limit).forEach(d=>{
    html += `<div class="alert amber"><div class="ic">&#9650;</div><div class="body"><b>${esc(d.name)} is over its limit</b> by <span class="amt">${fmt(d.balance-d.limit)}</span> (balance ${fmt(d.balance)} on a ${fmt(d.limit)} line).</div></div>`;
  });
  al.innerHTML = html;

  // upcoming 14 days
  const up = upcomingDue(14);
  $("ov_upcoming").innerHTML = up.length ? up.map(e=>`
    <div class="rrow"><div class="nm"><div class="t">${esc(e.name)}</div><div class="d">${e.label}</div></div>
    <span class="pill ${e.cls}">${e.when}</span>
    <div style="font-family:var(--mono);font-variant-numeric:tabular-nums;min-width:84px;text-align:right">${fmt(e.amount)}</div></div>
  `).join("") : `<div class="note">Nothing due in the next 14 days.</div>`;
}
function fmtDate(iso){ const d=new Date(iso+"T00:00:00"); return MONTHS[d.getMonth()].slice(0,3)+" "+d.getDate(); }
function upcomingDue(days){
  const out=[];
  const start=new Date(TODAY); const end=new Date(TODAY); end.setDate(end.getDate()+days);
  // recurring bills: next occurrence of dueDay
  state.bills.forEach(b=>{
    const occ = nextOccurrence(b.dueDay);
    if(occ>=start && occ<=end){
      const dd=Math.round((occ-start)/86400000);
      out.push({name:b.name, amount:monthlyBill(b), date:occ, label:"Due day "+b.dueDay+(b.freq==="quarterly"?" (quarterly)":""), when:dd<=0?"today":(dd+"d"), cls:dd<=2?"red":dd<=5?"amber":"brass"});
    }
  });
  // affirm by exact date
  state.affirm.forEach(a=>{
    const d=new Date(a.due+"T00:00:00");
    if(d>=start && d<=end || a.status==="overdue"){
      const dd=Math.round((d-start)/86400000);
      out.push({name:a.name+" (Affirm)", amount:a.amount, date:d, label:fmtDate(a.due), when:a.status==="overdue"?"overdue":(dd<=0?"today":dd+"d"), cls:a.status==="overdue"?"red":dd<=5?"amber":"brass"});
    }
  });
  out.sort((x,y)=>x.date-y.date);
  return out;
}
function nextOccurrence(day){
  let d=new Date(TODAY.getFullYear(),TODAY.getMonth(),day);
  if(d<new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate())) d=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,day);
  return d;
}

function renderCalendar(v){
  v.innerHTML = `
    <div class="eyebrow">Bill calendar</div>
    <div class="calhead">
      <button class="navbtn" id="cal_prev">&#8249;</button>
      <div class="mo" id="cal_mo"></div>
      <button class="navbtn" id="cal_next">&#8250;</button>
    </div>
    <div class="calgrid" id="cal_dows">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="dow">${d}</div>`).join("")}</div>
    <div class="calgrid" id="cal_grid" style="margin-top:6px"></div>
    <div class="hr"></div>
    <div class="label" style="font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:10px">This month, in order</div>
    <div class="rowlist" id="cal_list"></div>
  `;
  $("cal_prev").onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} drawCalendar(); };
  $("cal_next").onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} drawCalendar(); };
  drawCalendar();
}
function drawCalendar(){
  $("cal_mo").textContent = MONTHS[calMonth]+" "+calYear;
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const evByDay={};
  state.bills.forEach(b=>{ const dd=Math.min(b.dueDay,days); (evByDay[dd]=evByDay[dd]||[]).push({t:b.name,amount:monthlyBill(b),cls:"b",q:b.freq==="quarterly"}); });
  state.affirm.forEach(a=>{ const d=new Date(a.due+"T00:00:00"); if(d.getMonth()===calMonth && d.getFullYear()===calYear){ (evByDay[d.getDate()]=evByDay[d.getDate()]||[]).push({t:a.name,amount:a.amount,cls:a.status==="overdue"?"r":"a"}); } });

  let cells="";
  for(let i=0;i<first;i++) cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday = (d===TODAY.getDate() && calMonth===TODAY.getMonth() && calYear===TODAY.getFullYear());
    const evs=(evByDay[d]||[]).map(e=>`<div class="ev ${e.cls}">${esc(e.t.split(" (")[0])}</div>`).join("");
    cells+=`<div class="cell ${isToday?"today":""}"><div class="dn">${d}</div>${evs}</div>`;
  }
  $("cal_grid").innerHTML=cells;

  // ordered list
  const list=[];
  state.bills.forEach(b=>list.push({day:b.dueDay, name:b.name, amount:monthlyBill(b), tag:b.freq==="quarterly"?"quarterly":(b.autopay?"autopay":""), cls:"brass"}));
  state.affirm.forEach(a=>{ const d=new Date(a.due+"T00:00:00"); if(d.getMonth()===calMonth&&d.getFullYear()===calYear) list.push({day:d.getDate(), name:a.name+" (Affirm)", amount:a.amount, tag:a.status, cls:a.status==="overdue"?"red":"amber"}); });
  list.sort((x,y)=>x.day-y.day);
  let total=list.reduce((s,e)=>s+e.amount,0);
  $("cal_list").innerHTML = list.map(e=>`
    <div class="rrow"><div style="font-family:var(--mono);width:34px;color:var(--muted);font-size:13px">${e.day}</div>
      <div class="nm"><div class="t">${esc(e.name)}</div></div>
      ${e.tag?`<span class="pill ${e.cls}">${e.tag}</span>`:""}
      <div style="font-family:var(--mono);font-variant-numeric:tabular-nums;min-width:84px;text-align:right">${fmt(e.amount)}</div></div>
  `).join("") + `<div class="rrow"><div style="width:34px"></div><div class="nm"><div class="t" style="color:var(--muted)">Total scheduled this month</div></div><div style="font-family:var(--mono);font-weight:600;min-width:84px;text-align:right">${fmt(total)}</div></div>`;
}

function updateDebtCard(d){

  if(ut) ut.textContent = d.limit>0 ? pct(util)+" used" : "";
  if(mt){ mt.style.width=Math.min(100,util)+"%"; mt.style.background=over?"var(--danger)":util>30?"var(--amber)":"var(--sage)"; }

function syncDebtTotals(){
  const c=compute();
  if($("db_total")){
    $("db_total").textContent=fmt0(c.consumerDebt);
    $("db_min").textContent=fmt(c.minPayments);

function drawFoodDonut(){
  const t=FOODDATA.typical, eatOut=t.delivery+t.coffee+t.restaurants;
  const segs=[[t.restaurants,"var(--amber)"],[t.delivery,"var(--brass)"],[t.coffee,"var(--info)"]];
  let acc=0; const stops=segs.map(s=>{ const a=acc/eatOut*360; acc+=s[0]; const b=acc/eatOut*360; return `${s[1]} ${a}deg ${b}deg`; });
  const d=$("fd_donut"); if(d) d.style.background=`conic-gradient(${stops.join(",")})`;
}

function syncBudget(){
  const c=compute();
  if(!$("bd_inc")) return;
  $("bd_inc").textContent=fmt(c.incomeTotal);
  $("bd_bills").textContent=fmt(c.billsMonthly);
  $("bd_var").textContent=fmt(c.variable);
  $("bd_left").textContent=fmt(c.leftover); $("bd_left").className=c.leftover>=0?"pos":"neg";
  const gap=$("bd_gap");
  if(gap){
    if(c.leftover<0) gap.innerHTML=`<div class="alert red"><div class="ic">&#9660;</div><div class="body"><b>Monthly shortfall of <span class="amt">${fmt(-c.leftover)}</span>.</b> A typical month runs close to even, but project and trip months push you into the red and onto the cards.</div></div>`;
    else gap.innerHTML=`<div class="alert amber" style="border-color:rgba(116,185,140,.4);background:rgba(116,185,140,.07)"><div class="ic" style="color:var(--sage)">&#9650;</div><div class="body"><b>You have <span class="amt">${fmt(c.leftover)}</span> left each month</b> after bills and variable spending.</div></div>`;
  }
  const tot=Math.max(c.incomeTotal,c.outflow,1);
  const fw=c.billsMonthly/tot*100, vw=c.variable/tot*100, lw=Math.max(0,c.leftover)/tot*100;
  $("bd_flow").innerHTML=
    `<span style="width:${fw}%;background:var(--brass)">${fw>14?"Bills":""}</span>`+
    `<span style="width:${vw}%;background:var(--amber)">${vw>12?"Variable":""}</span>`+
    `<span style="width:${lw}%;background:var(--sage)">${lw>14?"Leftover":""}</span>`;
  if($("bd_donut")){
    const entries=Object.entries(c.cats).sort((a,b)=>b[1]-a[1]);
    const sum=entries.reduce((s,e)=>s+e[1],0)||1; let acc=0,stops=[];
    entries.forEach(([k,val])=>{ const col=CATCOLORS[k]||CATCOLORS.Other; const s0=acc/sum*360; acc+=val; const e0=acc/sum*360; stops.push(`${col} ${s0}deg ${e0}deg`); });
    $("bd_donut").style.background=`conic-gradient(${stops.join(",")})`;
    $("bd_donut_v").textContent=fmt0(sum);
    $("bd_legend").innerHTML=entries.map(([k,val])=>`<div class="li"><span class="sw" style="background:${CATCOLORS[k]||CATCOLORS.Other}"></span><span class="nm">${k}</span><span class="vl">${fmt(val)}</span></div>`).join("");
  }
  if($("bd_health")){
    const dti=c.incomeTotal>0?c.minPayments/c.incomeTotal*100:0, sr=c.incomeTotal>0?c.leftover/c.incomeTotal*100:0;
    $("bd_health").innerHTML=`<table class="kvtable"><tr><td>Minimum debt payments vs income</td><td class="${dti>20?'neg':dti>10?'warnc':'pos'}">${pct(dti)}</td></tr><tr><td>Leftover as share of income</td><td class="${sr<0?'neg':sr<10?'warnc':'pos'}">${pct(sr)}</td></tr><tr><td>Card balances over limit</td><td class="${c.ccBalance>c.ccLimit?'neg':'pos'}">${c.ccBalance>c.ccLimit?fmt(c.ccBalance-c.ccLimit):'none'}</td></tr></table>`;
  }
  if($("bd_catlist")){
    const list=BUDGET_CATS.filter(x=>x.key!=="overview").map(x=>({cat:x,amt:catAmount(x)})).sort((a,b)=>b.amt-a.amt);
    const max=Math.max.apply(null,list.map(x=>x.amt).concat([1]));
    $("bd_catlist").innerHTML=list.map(o=>`<button class="catrow" data-gocat="${o.cat.key}"><span class="catic2" style="color:${catColor(o.cat.key)}">${icon(o.cat.icon)}</span><span class="crname">${o.cat.label}</span><span class="crbar"><span style="width:${o.amt/max*100}%;background:${catColor(o.cat.key)}"></span></span><span class="cramt">${fmt0(o.amt)}</span></button>`).join("");
    $("bd_catlist").querySelectorAll(".catrow").forEach(b=>b.addEventListener("click",()=>{ budgetCat=b.getAttribute("data-gocat"); const nav=$("bd_nav"); if(nav) nav.querySelectorAll(".catchip").forEach(x=>x.classList.toggle("active",x.getAttribute("data-cat")===budgetCat)); drawBudgetDetail(); window.scrollTo({top:120,behavior:'smooth'}); }));
  }
}

//////////////////// SELL & EQUITY ////////////////////
function sellCompute(){
  const m=state.mortgage, s=state.sell;
  const sp=Number(s.salePrice)||0, payoff=Number(m.balance)||0;
  const commission=sp*(Number(s.commissionPct)||0)/100;
  const concessions=sp*(Number(s.concessionsPct)||0)/100;
  const transfer=sp*(Number(s.transferPct)||0)/100;
  const flat=(s.costs||[]).reduce((a,c)=>a+(Number(c.amount)||0),0);
  const sellingCosts=commission+concessions+transfer+flat;
  const net=sp-payoff-sellingCosts;
  let debtPaid=0; const debtLines=[];
  state.debts.forEach(d=>{
    const p=s.payoff&&s.payoff[d.id];
    const pay=p?p.pay!==false:true;
    const amount=(p&&typeof p.amount==="number")?p.amount:(Number(d.balance)||0);
    if(pay&&amount>0){ debtPaid+=amount; debtLines.push({name:d.name,amount}); }
  });
  return {sp,payoff,commission,concessions,transfer,flat,sellingCosts,net,debtPaid,debtLines,equity:Number(m.equity)||0};
}

function syncSell(){
  if(!$("se_sheet")) return;
  const r=sellCompute(), s=state.sell;
  const finalCash=r.net-r.debtPaid;
  $("se_sp_lbl").textContent=fmt0(r.sp);
  $("se_comm_lbl").textContent=(Number(s.commissionPct)||0).toFixed(2)+"%";
  $("se_conc_lbl").textContent=(Number(s.concessionsPct)||0).toFixed(2)+"%";
  const rocket=Math.round(r.equity+r.payoff), diff=r.sp-rocket;
  $("se_vsrocket").innerHTML= diff===0?`Right at the Rocket estimate of ${fmt0(rocket)}.`:`${fmt0(Math.abs(diff))} ${diff>0?"above":"below"} the Rocket estimate of ${fmt0(rocket)}.`;
  const denom=Math.max(r.sp, r.payoff+r.sellingCosts+r.debtPaid, 1);
  $("se_bar").innerHTML=[[r.payoff,"var(--brass-dim)"],[r.sellingCosts,"var(--danger)"],[r.debtPaid,"var(--info)"],[Math.max(0,finalCash),"var(--sage)"]].map(x=>`<span style="width:${x[0]/denom*100}%;background:${x[1]}"></span>`).join("");
  let rows=`<tr><td>Sale price</td><td class="pos">${fmt(r.sp)}</td></tr>`;
  rows+=`<tr><td>Mortgage payoff (Rocket)</td><td class="neg">-${fmt(r.payoff)}</td></tr>`;
  rows+=`<tr><td>Agent commission (${(Number(s.commissionPct)||0).toFixed(2)}%)</td><td class="neg">-${fmt(r.commission)}</td></tr>`;
  rows+=`<tr><td>Georgia transfer tax</td><td class="neg">-${fmt(r.transfer)}</td></tr>`;
  if(r.concessions>0) rows+=`<tr><td>Concessions (${(Number(s.concessionsPct)||0).toFixed(2)}%)</td><td class="neg">-${fmt(r.concessions)}</td></tr>`;
  s.costs.forEach(c=>{ rows+=`<tr><td>${esc(c.name)}</td><td class="neg">-${fmt(Number(c.amount)||0)}</td></tr>`; });
  rows+=`<tr><td><b>Net proceeds before debts</b></td><td><b>${fmt(r.net)}</b></td></tr>`;
  r.debtLines.forEach(d=>{ rows+=`<tr><td>Pay off: ${esc(d.name)}</td><td class="neg">-${fmt(d.amount)}</td></tr>`; });
  rows+=`<tr><td><b>Cash to you after debts</b></td><td><b class="${finalCash>=0?'pos':'neg'}">${fmt(finalCash)}</b></td></tr>`;
  $("se_sheet").innerHTML=rows;
  $("se_final").textContent=fmt0(finalCash); $("se_final").className="stat lg "+(finalCash>=0?"pos":"neg");
  $("se_net").textContent=fmt(r.net);
  $("se_debt2").textContent="-"+fmt(r.debtPaid);
  $("se_costs").textContent="-"+fmt(r.sellingCosts);
  $("se_costpct").textContent= r.sp>0?pct(r.sellingCosts/r.sp*100):"0%";
  if($("se_debttotal")) $("se_debttotal").textContent="-"+fmt(r.debtPaid);
}

  v.innerHTML=`
    <div class="eyebrow">Settings</div>
    <div class="sec-title">Your data</div>
    <div class="sec-note">Everything you edit is stored ${canPersist?"in this app and persists between sessions":"for this session only (persistent storage is not available here)"}.</div>
    <div class="card">
      <div class="label">Backup &amp; restore</div>
      <div class="note" style="margin-top:0">Export pulls all your numbers into a file you can keep. Import loads them back in.</div>
      <div class="flexbtns">
        <button class="ghostbtn" id="set_export">Export data</button>
        <button class="ghostbtn" id="set_import">Import data</button>
        <input type="file" id="set_file" accept="application/json" style="display:none">
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="label">Reset</div>
      <div class="note" style="margin-top:0">Restores the original starting numbers. This clears any edits you have made.</div>
      <div class="flexbtns"><button class="ghostbtn warn" id="set_reset">Reset to starting data</button></div>
    </div>
    ${!canPersist?`<div class="alert amber" style="margin-top:14px"><div class="ic">i</div><div class="body">Persistent storage is not active in this environment. Your edits work now but will not survive a reload. Use Export to keep a copy.</div></div>`:""}
  `;
  $("set_export").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="financial-command-center-backup.json"; a.click();
  };
  $("set_import").onclick=()=>$("set_file").click();
  $("set_file").onchange=(e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ try{ state=JSON.parse(r.result); saveState(true); renderView(); alert("Data imported."); }catch(err){ alert("That file could not be read."); } }; r.readAsText(f);
  };
  $("set_reset").onclick=()=>{ if(confirm("Reset everything to the original starting numbers?")){ state=deepClone(DEFAULTS); saveState(true); renderView(); } };
}

//////////////////// BOOT ////////////////////
(async function(){
  await loadState();
  // guard against older/missing fields
  if(!state.variable || typeof state.variable!=="object") state.variable=deepClone(DEFAULTS.variable);
  if(!state.meta) state.meta={};
  if(state.meta.varVer !== DEFAULTS.meta.varVer){ state.variable=deepClone(DEFAULTS.variable); state.meta.varVer=DEFAULTS.meta.varVer; await saveState(true); }
  if(!state.sell || typeof state.sell!=="object") state.sell=deepClone(DEFAULTS.sell);
  if(!Array.isArray(state.sell.costs)){
    state.sell.costs=[
      {id:"sc_attorney",name:"Closing attorney & settlement",amount:Number(state.sell.attorneyFee)||900},
      {id:"sc_prep",name:"Prep, repairs & staging",amount:Number(state.sell.prepCost)||0},
      {id:"sc_mom",name:"Repay Mom (help)",amount:10000}
    ];
    delete state.sell.attorneyFee; delete state.sell.prepCost;
  }
  if(typeof state.sell.transferPct==="undefined") state.sell.transferPct=0.1;
  if(!state.sell.payoff || typeof state.sell.payoff!=="object") state.sell.payoff={};
  if(!state.contrib) state.contrib=deepClone(DEFAULTS.contrib);
  renderTabs();
  renderView();
  markSaved();
})();
</script>
</body>
</html>
